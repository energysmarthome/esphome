# Definiáljuk a reléket
light:
  - platform: binary
    name: "Bejáratiajtó villanykapcsoló kertilámpák dummy"
    restore_mode: RESTORE_DEFAULT_OFF
    output: led_output1
    id: relay1
  - platform: binary
    name: "Bejáratiajtó villanykapcsoló reflektor"
    output: led_output2
    id: relay2
  - platform: binary
    name: "Bejáratiajtó villanykapcsoló Beépített LED"
    output: led_output
    restore_mode: RESTORE_DEFAULT_ON
switch:
  - platform: restart
    name: "bejaratiajtovillanykapcsolo Restart"


output:
  - platform: gpio
    pin: GPIO12
    id: led_output1
  - platform: gpio
    pin: GPIO05
    id: led_output2
  - platform: gpio
    pin: GPIO13
    id: led_output




# pink d26 és d0, másik d27 és d1
wiegand:
  - id: keypad
    #you can change the d1 and d0 pins as you like, htis could be mandatory if you change the board
    d0: GPIO1
    d1: GPIO3
    on_key:
      - lambda: ESP_LOGI("KEY", "received key %d", x);
    # on_tag:
    #   - lambda: ESP_LOGI("TAG", "received tag %s", x.c_str());

    on_tag:
     - lambda: |
         ESP_LOGI("TAG", "received tag %s", x.c_str());
         id(tagcode).publish_state(x.c_str());
         // Kapcsoljuk fel a coderec binary sensor-t
         id(fingerprintrec).publish_state(true);
     - delay: 200ms
     - lambda: |
         // Majd 200ms után kapcsoljuk vissza OFF-ra
         id(fingerprintrec).publish_state(false);

    on_raw:
      - lambda: ESP_LOGI("RAW", "received raw %d bits, value %llx", bits, value);

key_collector:
  - id: pincode_reader
    source_id: keypad
    #length can be changed if needed
    min_length: 4
    max_length: 4
    #end key can be changed if needed
    end_keys: "#" 
    end_key_required: true
    allowed_keys: "0123456789"
    
    #timeout ccan be changed if needed
    timeout: 5s
    on_progress:
      - logger.log:
          format: "input progress: '%s', started by '%c'"
          args: [ 'x.c_str()', "(start == 0 ? '~' : start)" ]
    on_result:
      - logger.log:
          format: "input result: '%s', started by '%c', ended by '%c'"
          args: [ 'x.c_str()', "(start == 0 ? '~' : start)", "(end == 0 ? '~' : end)" ]
      - lambda: id(keycode).publish_state(x.c_str());
      - lambda: id(coderec).publish_state(true);
      - delay: 200ms
      - lambda: id(coderec).publish_state(false);
    on_timeout:
      - logger.log:
          format: "input timeout: '%s', started by '%c'"
          args: [ 'x.c_str()', "(start == 0 ? '~' : start)" ]

text_sensor:
  - platform: template
    name: keycode
    id: keycode
  - platform: template
    name: "Tagcode"
    id: tagcode

# Definiáljuk a gombokat
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Bejáratiajtó villanykapcsoló gomb1"
    on_press:
      - light.toggle: relay1
  - platform: gpio
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: True
    name: "Bejáratiajtó villanykapcsoló gomb2"
    on_press:
      - light.toggle: relay2
  - platform: template
    name: code received
    id: coderec
  - platform: template
    name: fingerprint received
    id: fingerprintrec