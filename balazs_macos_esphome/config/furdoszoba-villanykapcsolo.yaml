# Enable Home Assistant API
api:
  encryption:
    key: "aRWDUH4Qtp772ox+UXrL+xowTrKRgAIsAwAsnlsFUQ8="

ota:
  - platform: esphome
    password: "43b0c10dc59c3cae538a7a3fc8591b66"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
