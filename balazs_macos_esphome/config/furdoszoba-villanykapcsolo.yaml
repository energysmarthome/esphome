web_server:
  port: 80

# Definiáljuk a reléket
switch:

  - platform: restart
    name: "furdoszobalampakapcsolo Restart"


# Definiáljuk a beépített LED-et, ha van
light:
  - platform: binary
    name: "Beépített LED"
    output: led_output
  - platform: binary
    name: "Fürdőszoba lámpakapcsoló"
    output: led_output1
    id: relay1


output:
  - platform: gpio
    pin: GPIO13
    inverted: true
    id: led_output
  - platform: gpio
    pin: GPIO12
    inverted: false
    id: led_output1
# Definiáljuk a gombokat
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Fürdőszoba lámpakapcsoló"
    on_press:
      - light.toggle: relay1
