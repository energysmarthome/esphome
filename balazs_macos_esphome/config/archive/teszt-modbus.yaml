sensor:
  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Feszültség 1"
    register_type: holding
    address: 160
    unit_of_measurement: "V"
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.01  # Konverzió az ADC értékből Voltba
  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Feszültség 2"
    register_type: holding
    address: 161
    unit_of_measurement: "V"
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.01  # Konverzió az ADC értékből Voltba
  - platform: modbus_controller
    modbus_controller_id: modbus_client2
