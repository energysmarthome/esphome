esphome:
  name: teszt-modbus
  friendly_name: teszt_modbus

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "4Fi1Lt0czt63klvb0AWe7QoLiqqzgG93b8O7fqIblTg="


ota:
  - platform: esphome
    password: "b88f537701fe5b8d9c2919f8672edd0b"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.10
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "teszmodbus Fallback Hotspot"
    password: "qGrIZv1s1FUd"

captive_portal:
    
web_server:
  port: 80




uart:
  - id: uart_modbus_client
    tx_pin: 17
    rx_pin: 16
    baud_rate: 9600


modbus:
  - uart_id: uart_modbus_client
    id: modbus_client


modbus_controller:
  - id: modbus_client1
    modbus_id: modbus_client
    address: 1
    update_interval: 5s
  - id: modbus_client2
    modbus_id: modbus_client
    address: 2
    update_interval: 5s
  - id: modbus_client3
    modbus_id: modbus_client
    address: 3
    update_interval: 5s

switch:
  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Relé1"
    register_type: coil
    address: 0 # A megadott relécím
    bitmask: 1    # A megfelelő bit a vezérléshez
  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Relé2"
    register_type: coil
    address: 1 # A megadott relécím
    bitmask: 1    # A megfelelő bit a vezérléshez
  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Relé3"
