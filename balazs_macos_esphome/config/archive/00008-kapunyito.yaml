substitutions:
  device_name: 00008_kapunyito
  friendly_name: 00008_kapunyito

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.mcu: esp32c3
    board_build.variant: esp32c3
    board_build.f_cpu: 160000000L
    board_build.f_flash: 80000000L
    board_build.flash_mode: dio
    board_build.flash_size: 8MB

esp32:
  board: esp32-c3-devkitm-1
  flash_size: 8MB
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ap:
    ssid: "kapunyito"
    password: "12345678"

captive_portal:

web_server:

output:
  - platform: gpio
    id: relay_output
    pin: GPIO5

switch:
  - platform: output
    id: relay
    name: "${friendly_name} Relay"
    output: relay_output


button:
  - platform: template
    name: "Kiskapu nyitása 5s"
    on_press:
      - script.execute: relay_on_5s


script:
  - id: relay_on_5s
    mode: restart
    then:
      - switch.turn_on: relay
      - delay: 5s
      - switch.turn_off: relay


binary_sensor:
  - platform: gpio
    id: wall_switch
    name: "${friendly_name} Switch Input"
    pin:
      number: GPIO10
      mode:
        input: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      - script.execute: relay_on_5s

  - platform: gpio
    id: button1
    name: "${friendly_name} Button"
    internal: true
    pin:
      number: GPIO4
      inverted: true
      mode:
        input: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms

sensor:
  - platform: adc
    id: temperature_sensor_voltage
    pin: GPIO3
    attenuation: 11db
    update_interval: 30s

  - platform: resistance
    id: temperature_sensor_resistance
    sensor: temperature_sensor_voltage
    configuration: DOWNSTREAM
    resistor: 10kOhm

  - platform: ntc
    name: "${friendly_name} Temperature"
    sensor: temperature_sensor_resistance
    calibration:
      b_constant: 3350
      reference_resistance: 10kOhm
      reference_temperature: 25°C




esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:


