esphome:
  name: vizoraaknameresek
  friendly_name: vizoraaknameresek

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "LwfMZEbyFMZLzZRc9so0IapoE1D50X7TFFnnXILaUQA="

ota:
  - platform: esphome
    password: "36b6f966032f0a27d81b588ba2b4c1f1"

wifi:
  ssid: !secret wifi_ssid_udvar
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.190
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Vizoraaknameresek"
    password: "umKnwharApU0"

captive_portal:

web_server:
  port: 80


# Switches
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO25
      mode:
        input: true
        pullup: true
    name: "locsolómérő"
    device_class: "window"
  - platform: gpio
    pin: 
      number: GPIO32
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Vízóraakna vízszint MaxMax"
    device_class: "window"
  - platform: gpio
    pin: 
      number: GPIO33
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Vízóraakna vízszint MinMin"
    device_class: "window"
  - platform: gpio
    pin: 
      number: GPIO23
      mode:
        input: true
        pullup: true
    name: "ivóvízmérő"
    device_class: "window"

# DS18B20 temperature sensors
one_wire:
  - pin: GPIO4
    platform: gpio

  
# I2C bus configuration
i2c:
  sda: GPIO19
  scl: GPIO18
  scan: true
# Valószínűleg a 10kHz a jó beállítás, és mostmár csak a távolságmérő konfigját kellene átállítani !!!!
  frequency: 10kHz


ads1115:
  - address: 0x48
    id: ads1115_a
    continuous_mode: true

sensor:
  - platform: dallas_temp
    address: "0xbc3c01e076b90828"
    name: "Ivóvíz hőmérséklet valós mért"
  - platform: dallas_temp
    address: "0xa53de1e380123828"
    name: "Vízóraakna hőmérséklet"
  - platform: vl53l0x
    name: "VL53L0X Távolságmérő"
    update_interval: 5s
    timeout: 20ms


  - platform: ads1115
    ads1115_id: ads1115_a
    multiplexer: 'A1_GND'
    update_interval: 3s
    name: "Ivóvíz nyomásmérés feszültség"
    gain: 4.096
    filters:
      - calibrate_linear:
         method: exact
         datapoints:
           - -0.023 -> 0
           - 0.229 -> 1.304
           - 0.325 -> 1.786
           - 0.423 -> 2.28
           - 0.529 -> 2.8
           - 0.605 -> 3.19
           - 0.72 -> 3.77



switch:
  - platform: restart
    name: "vizoraaknameresek Restart"


