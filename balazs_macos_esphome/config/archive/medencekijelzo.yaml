select:
  - platform: template
    id: fan_mode
    name: "Fűtés szivattyú mód"
    optimistic: true           # Home Assistant azonnal látja a kiválasztást
    initial_option: "Kikapcsolva"
    options:
      - "Kikapcsolva"
      - "1. sebesség"
      - "2. sebesség"
      - "3. sebesség"

    # Amikor a felhasználó módot vált
    on_value:
      then:
        - lambda: |-
            const std::string &mode = id(fan_mode).state;

            if (mode == "Kikapcsolva") {
              id(relay1).turn_off();
              id(relay2).turn_off();
              id(relay3).turn_off();


            } else if (mode == "1. sebesség") {
              id(relay1).turn_off();
              id(relay2).turn_off();
              id(relay3).turn_on();


            } else if (mode == "2. sebesség") {
              id(relay1).turn_off();
              id(relay2).turn_on();
              id(relay3).turn_on();


            } else if (mode == "3. sebesség") {
              id(relay1).turn_on();
              /* A 2-es relé „mindegy”, hagyjuk a jelenlegi állapotán */
              id(relay3).turn_on();
            }



