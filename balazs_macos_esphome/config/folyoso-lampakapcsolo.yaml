esphome:
  name: folyoso-lampakapcsolo
  friendly_name: folyoso_lampakapcsolo

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "p2mJPPXlewAwyx5QmtuyLY+WAvhMLLTVg9PmvdwRGfI="

ota:
  - platform: esphome
    password: "30dfd46b91cedc39d64d23dab16091c2"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.226
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Folyoso-Lampakapcsolo"
    password: "VvNoHjdf46Uf"

captive_portal:
    

web_server:
  port: 80

# Definiáljuk a reléket
switch:

  - platform: restart
    name: "folyosolampakapcsolo Restart"


# Definiáljuk a beépített LED-et, ha van
light:
  - platform: binary
    name: "Beépített LED"
    output: led_output
  - platform: binary
    name: "Folyosó lámpakapcsoló"
    output: led_output1
    id: relay1

output:
  - platform: gpio
    pin: GPIO13
    inverted: true
    id: led_output
  - platform: gpio
    pin: GPIO12
    inverted: false
    id: led_output1
# Definiáljuk a gombokat
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Folyosó lámpakapcsoló"
    on_press:
      - light.toggle: relay1
