select:
  - platform: template
    id: golyoscsapirany
    name: "Medence fűtés golyóscsap irány beállítása"
    optimistic: true
    restore_value: true
    options:
      - "Nyitás"
      - "Zárás"
    on_value:
      then:
        - lambda: |-
            const std::string &mode = id(golyoscsapirany).state;
            if (mode == "Nyitás") {
              id(relay1).turn_on();
              id(relay2).turn_on();
            } else if (mode == "Zárás") {
              id(relay1).turn_off();
              id(relay2).turn_off();
            }





