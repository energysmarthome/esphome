display:
  - platform: ili9xxx
    model: ST7735    # Kijelző típus 
    cs_pin: GPIO5                # Chip Select 
    dc_pin: GPIO2                # Data/Command jel 
    reset_pin: GPIO4             # Hardveres reset 
    update_interval: 5s          # Frissítési gyakoriság 
    invert_colors: false
    rotation: 0
    color_palette: 8BIT
    dimensions:
      height: 240
      width: 320
    lambda: |-
      /* MEDENCEVÍZ HŐMÉRSÉKLET */
      it.printf(0,  0,  id(font_10), "Medenceviz hom.:");
      it.printf(30, 18, id(font_16), "%.1f C", id(medenceviz_homerseklet).state);

      /* NAPKOLLEKTORTÓL JÖVŐ VÍZ HŐMÉRSÉKLETE */
      it.printf(0, 52,  id(font_10), "Napkollektor viz hom.:");
      it.printf(30, 70, id(font_16), "%.1f C", id(napkollektor_homerseklet).state);

      /* FÜRDÉS MÓD */
      it.printf(0,   108, id(font_10), "FURDES:");
      it.printf(18,  125, id(font_16), "%s", id(furdesmod).state ? "BE" : "KI");

      /* HOMOKSZURO */
      it.printf(100, 108, id(font_10), "HOMOKSZURO:");
      it.printf(128, 125, id(font_16), "%s", id(homokszuroallapota).state ? "BE" : "KI");

      /* FŰTÉS GOLYÓSCSAP*/
      it.printf(200, 0, id(font_10), "GOLYOSCSAP:");
      it.printf(200, 17, id(font_16), "%s", id(golyoscsapirany).state);

      /* FŰTÉS */
      it.printf(0, 181, id(font_10), "FUTES:");
      it.printf(18, 198, id(font_16), "%s", id(open_and_delay_relay4).state ? "BE" : "KI");

      /* FŰTŐ SZITVATTYÚ UTÁNI NYOMÁS */
      it.printf(100, 181,  id(font_10), "NYOMAS:");
      it.printf(125, 198, id(font_16), "%.1f mbar", id(medencefutes_szivattyu_nyomasa).state);



