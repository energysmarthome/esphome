sensor:
  ### WIFI JELERŐSSÉG
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 5s
    entity_category: "diagnostic"

  ### HOME ASSISTANTBÓL INTEGRÁLT ENTITÁSOK
  - platform: homeassistant
    entity_id: sensor.medence_homokszuro_napi_uzemido
    internal: true
    id: homokszuronapiuzemido

  - platform: homeassistant
    entity_id: sensor.medencefutes_szivattyu_nyomasa
    internal: true
    id: medencefutes_szivattyu_nyomasa

  - platform: homeassistant
    entity_id: sensor.medence_futes_delta_t
    internal: true
    id: futesdeltat
    unit_of_measurement: "K"

  ### DS18B20 HŐMÉRŐK ONE WIRE BUS-ON
  - platform: dallas_temp
    address: "0xb50b23744c6fcc28"
    id: medenceviz_homerseklet
    name: "Medencevíz hőmréséklet számításhoz"

  - platform: dallas_temp
    address: "0x9a0b2374c56c3f28"
    id: napkollektor_homerseklet
    name: "Napkollektortól jövő víz hőmérséklet számításhoz"

  ### BOARD 2 FESZÜLTSÉGMÉRÉSEK
  - platform: modbus_controller
    modbus_controller_id: modbus_client2
    name: "Board2 feszültség1"
    register_type: holding
    address: 160
    unit_of_measurement: "V"
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

display:
  - platform: ili9xxx
    model: ST7735
    cs_pin: GPIO5
    dc_pin: GPIO2
    reset_pin: GPIO4
    update_interval: 5s
    invert_colors: false
    rotation: 0
    color_palette: 8BIT
    dimensions:
      height: 240
      width: 320
    lambda: |-
      /* MEDENCEVÍZ HŐMÉRSÉKLET */
      it.printf(0,  0,  id(font_10), "Medenceviz hom.:");
      it.printf(30, 18, id(font_16), "%.1f C", id(medenceviz_homerseklet).state);

      /* NAPKOLLEKTORTÓL JÖVŐ VÍZ HŐMÉRSÉKLETE */
      it.printf(0, 52,  id(font_10), "Napkollektor viz hom.:");
      it.printf(30, 70, id(font_16), "%.1f C", id(napkollektor_homerseklet).state);

      /* FÜRDÉS MÓD */
      it.printf(0,   108, id(font_10), "FURDES:");
      it.printf(18,  125, id(font_16), "%s", id(furdesmod).state ? "BE" : "KI");

      /* HOMOKSZURO */
      it.printf(100, 108, id(font_10), "HOMOKSZURO:");
      it.printf(128, 125, id(font_16), "%s", id(homokszuroallapota).state ? "BE" : "KI");

      /* FŰTÉS GOLYÓSCSAP */
      it.printf(200, 0, id(font_10), "GOLYOSCSAP:");
      auto golyoscsap_option = id(golyoscsapirany).current_option();
      it.printf(200, 17, id(font_16), "%.*s", (int) golyoscsap_option.size(), golyoscsap_option.c_str());

      /* FŰTÉS */
      it.printf(0, 181, id(font_10), "FUTES:");
      it.printf(18, 198, id(font_16), "%s", id(open_and_delay_relay4).state ? "BE" : "KI");

      /* FŰTŐ SZIVATTYÚ UTÁNI NYOMÁS */
      it.printf(100, 181,  id(font_10), "NYOMAS:");
      it.printf(125, 198, id(font_16), "%.1f mbar", id(medencefutes_szivattyu_nyomasa).state);

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

switch:
  ### RESTART
  - platform: restart
    name: "medencevezerlo Restart"

  ### 1-ES BOARD RELÉI
  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Medence fűtés golyóscsap"
    id: relay3
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 0
    bitmask: 1

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Medence fűtés golyóscsap irány1"
    id: relay2
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 1
    bitmask: 1

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Medence fűtés golyóscsap irány2"
    id: relay1
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 2
    bitmask: 1

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Medence töltőszelep"
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 3
    bitmask: 1

  ### 2-ES BOARD RELÉI
  - platform: modbus_controller
    modbus_controller_id: modbus_client2
    name: "Medence fűtő szivattyú dugalj"
    id: relay4
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 2
    bitmask: 1

  - platform: modbus_controller
    modbus_controller_id: modbus_client2
    name: "Medence homokszűrő"
    id: homokszuro_switch
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 3
    bitmask: 1

  ### LOGIKAI FŰTÉS KAPCSOLÓ
  - platform: template
    id: open_and_delay_relay4
    name: "Medence fűtő szivattyú"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

    turn_on_action:
      - lambda: |-
          ESP_LOGI("futes", "Futes inditas. Homokszuro: %s",
                   id(homokszuroallapota).state ? "ON" : "OFF");

      - if:
          condition:
            binary_sensor.is_on: homokszuroallapota

          then:
            # HA a homokszűrő üzemel:
            # először induljon a fűtőszivattyú
            - switch.turn_on: relay4

            # Várjuk meg, hogy a Modbus visszajelzés szerint tényleg bekapcsolt
            - wait_until:
                condition:
                  binary_sensor.is_on: futoszivattyu_dugalj_allapot
                timeout: 10s

            # Csak akkor nyitunk golyóscsapot, ha a szivattyú tényleg ON
            - if:
                condition:
                  binary_sensor.is_on: futoszivattyu_dugalj_allapot
                then:
                  - lambda: |-
                      ESP_LOGI("futes", "Futoszivattyu ON visszajelzes megvan, golyoscsap nyitas indul.");

                  # Motorengedélyezés biztosan OFF
                  - switch.turn_off: relay3
                  - delay: 300ms

                  # Irány beállítása nyitásra
                  - select.set:
                      id: golyoscsapirany
                      option: "Nyitás"

                  # Irányrelék stabilizálása
                  - delay: 300ms

                  # Golyóscsap motor indítása
                  - switch.turn_on: relay3

                  # Nyitási idő
                  - delay: 10s

                  # Golyóscsap motor leállítása
                  - switch.turn_off: relay3

                else:
                  - lambda: |-
                      ESP_LOGW("futes", "Futoszivattyu nem adott ON visszajelzest 10 mp alatt, golyoscsap nyitas tiltva.");

          else:
            # HA a homokszűrő nem üzemel:
            # először nyisson a golyóscsap, utána induljon a fűtőszivattyú
            - lambda: |-
                ESP_LOGI("futes", "Homokszuro OFF, eloszor golyoscsap nyitas.");

            # Motorengedélyezés biztosan OFF
            - switch.turn_off: relay3
            - delay: 300ms

            # Irány beállítása nyitásra
            - select.set:
                id: golyoscsapirany
                option: "Nyitás"

            # Irányrelék stabilizálása
            - delay: 300ms

            # Golyóscsap motor indítása
            - switch.turn_on: relay3

            # Nyitási idő
            - delay: 10s

            # Golyóscsap motor leállítása
            - switch.turn_off: relay3

            # Fűtőszivattyú indítása
            - switch.turn_on: relay4

    turn_off_action:
      - lambda: |-
          ESP_LOGI("futes", "Futes leallitas. Homokszuro: %s",
                   id(homokszuroallapota).state ? "ON" : "OFF");

      - if:
          condition:
            binary_sensor.is_on: homokszuroallapota

          then:
            # HA a homokszűrő ON:
            # először zárjon a golyóscsap, utána álljon le a fűtőszivattyú
            - lambda: |-
                ESP_LOGI("futes", "Homokszuro ON, eloszor golyoscsap zaras.");

            # Motorengedélyezés biztosan OFF
            - switch.turn_off: relay3
            - delay: 300ms

            # Irány beállítása zárásra
            - select.set:
                id: golyoscsapirany
                option: "Zárás"

            # Irányrelék stabilizálása
            - delay: 300ms

            # Golyóscsap motor indítása
            - switch.turn_on: relay3

            # Zárási idő
            - delay: 6s

            # Golyóscsap motor leállítása
            - switch.turn_off: relay3

            # Fűtőszivattyú leállítása
            - switch.turn_off: relay4

          else:
            # HA a homokszűrő OFF:
            # először álljon le a fűtőszivattyú, utána zárjon a golyóscsap
            - lambda: |-
                ESP_LOGI("futes", "Homokszuro OFF, eloszor futoszivattyu leallitas.");

            # Fűtőszivattyú leállítása
            - switch.turn_off: relay4

            # Rövid nyomáslecsengés
            - delay: 2s

            # Motorengedélyezés biztosan OFF
            - switch.turn_off: relay3
            - delay: 300ms

            # Irány beállítása zárásra
            - select.set:
                id: golyoscsapirany
                option: "Zárás"

            # Irányrelék stabilizálása
            - delay: 300ms

            # Golyóscsap motor indítása
            - switch.turn_on: relay3

            # Zárási idő
            - delay: 6s

            # Golyóscsap motor leállítása
            - switch.turn_off: relay3

binary_sensor:
  ### HOME ASSISTANTBÓL INTEGRÁLT ENTITÁSOK
  - platform: homeassistant
    id: furdesmod
    entity_id: input_boolean.nr_auto_vezerles_medencefurdesmod
    internal: true

  ### 6 DARAB NYOMÓGOMB
  - platform: gpio
    filters:
      - invert:
    pin:
      number: GPIO13
      mode:
        input: true
        pullup: true
    name: "nyomógomb1"
    device_class: "window"

  - platform: gpio
    filters:
      - invert:
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
    name: "nyomógomb2"
    device_class: "window"

  - platform: gpio
    filters:
      - invert:
    pin:
      number: GPIO26
      mode:
        input: true
        pullup: true
    name: "nyomógomb3"
    device_class: "window"

  - platform: gpio
    filters:
      - invert:
    pin:
      number: GPIO25
      mode:
        input: true
        pullup: true
    name: "nyomógomb4"
    device_class: "window"

  - platform: gpio
    filters:
      - invert:
    pin:
      number: GPIO32
      mode:
        input: true
        pullup: true
    name: "nyomógomb5"
    device_class: "window"

  - platform: gpio
    filters:
      - invert:
    pin:
      number: GPIO27
      mode:
        input: true
        pullup: true
    name: "nyomógomb6"
    device_class: "window"

  ### 1-ES BOARD RELÉI – ÁLLAPOT FIGYELÉS
  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Medence fűtés golyóscsap állapot"
    register_type: coil
    address: 0
    device_class: power

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Medence fűtés golyóscsap irány1 állapot"
    register_type: coil
    address: 1
    device_class: power

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Medence fűtés golyóscsap irány2 állapot"
    register_type: coil
    address: 2
    device_class: power

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Relé 4 állapot"
    register_type: coil
    internal: true
    address: 3
    device_class: power

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Relé 5 állapot"
    register_type: coil
    internal: true
    address: 4
    device_class: power

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Relé 6 állapot"
    register_type: coil
    internal: true
    address: 5
    device_class: power

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Relé 7 állapot"
    register_type: coil
    internal: true
    address: 6
    device_class: power

  - platform: modbus_controller
    modbus_controller_id: modbus_client1
    name: "Relé 8 állapot"
    register_type: coil
    internal: true
    address: 7
    device_class: power

  ### 2-ES BOARD RELÉI - ÁLLAPOT FIGYELÉS
  - platform: modbus_controller
    modbus_controller_id: modbus_client2
    name: "Medence fűtő szivattyú dugalj állapot"
    id: futoszivattyu_dugalj_allapot
    address: 2
    register_type: coil
    bitmask: 1
    device_class: power

  - platform: modbus_controller
    modbus_controller_id: modbus_client2
    name: "Medence homokszűrő állapot"
    id: homokszuroallapota
    address: 3
    register_type: coil
    bitmask: 1
    device_class: power

select:
  - platform: template
    id: golyoscsapirany
    name: "Medence fűtés golyóscsap irány beállítása"
    optimistic: true
    restore_value: true
    options:
      - "Nyitás"
      - "Zárás"
    on_value:
      then:
        - lambda: |-
            auto mode = id(golyoscsapirany).current_option();

            if (mode == "Nyitás") {
              id(relay1).turn_on();
              id(relay2).turn_on();
            } else if (mode == "Zárás") {
              id(relay1).turn_off();
              id(relay2).turn_off();
            }