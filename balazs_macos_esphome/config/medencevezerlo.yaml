  - platform: modbus_controller
    modbus_controller_id: modbus_client2
    name: "Medence fűtő szivattyú dugalj"
    register_type: coil
    id: relay4
    restore_mode: RESTORE_DEFAULT_OFF
    address: 2 # A megadott relécím
    bitmask: 1    # A megfelelő bit a vezérléshez
  - platform: modbus_controller
    modbus_controller_id: modbus_client2
    name: "Medence homokszűrő"
    register_type: coil
    id: homokszuro_switch
    restore_mode: RESTORE_DEFAULT_OFF
    address: 3 # A megadott relécím
    bitmask: 1    # A megfelelő bit a vezérléshez




    
#  - platform: template
#    id: open_and_delay_relay4
#    name: "Medence fűtő szivattyú"
#    optimistic: true
#    turn_on_action:
#      - select.set:
#          id: golyoscsapirany
#          option: "Nyitás"
#      - switch.turn_on: relay3 #golyóscsap nyitása
#      - delay: 10s
#      - switch.turn_on: relay4 #szivattyú indítása
#    turn_off_action:
#      - switch.turn_off: relay4
#      - select.set:
#          id: golyoscsapirany
#          option: "Zárás"


  - platform: template
    id: open_and_delay_relay4
    name: "Medence fűtő szivattyú"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - if:
          condition:
            switch.is_on: homokszuro_switch
          then:
            # HA a homokszűrő üzemel:
            # először induljon a fűtés szivattyú zárt / fojtott ágra
            - switch.turn_on: relay4
            # csak rövid ideig maradjon zárt állapotban
            - delay: 1s
            # utána nyisson a golyóscsap
            - select.set:
                id: golyoscsapirany
                option: "Nyitás"
            - switch.turn_on: relay3
          else:
            # HA a homokszűrő nem üzemel:
            # először nyisson a golyóscsap
            - select.set:
                id: golyoscsapirany
                option: "Nyitás"
            - switch.turn_on: relay3
            # várunk, amíg a golyóscsap kinyit
            - delay: 10s
            # utána induljon a fűtés szivattyú
            - switch.turn_on: relay4
    turn_off_action:
      - if:
          condition:
            switch.is_on: homokszuro_switch
          then:
            # HA a homokszűrő ON:
            # először zárjon a golyóscsap
            - select.set:
                id: golyoscsapirany
                option: "Zárás"
            - switch.turn_on: relay3
            # várunk, amíg a golyóscsap lezár
            - delay: 6s
            # utána álljon le a fűtő szivattyú
            - switch.turn_off: relay4
          else:
            # HA a homokszűrő OFF:
            # először leállhat a fűtő szivattyú
            - switch.turn_off: relay4
            # rövid nyomáslecsengés
            - delay: 2s
            # utána zárjon a golyóscsap
            - select.set:
                id: golyoscsapirany
                option: "Zárás"
            - switch.turn_on: relay3

          



