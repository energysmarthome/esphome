    name: "Medence töltőszelep"
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 3 # A megadott relécím
    bitmask: 1    # A megfelelő bit a vezérléshez

### 2-ES BOARD RELÉI ####################################################
  #- platform: modbus_controller
  #  modbus_controller_id: modbus_client2
  #  name: "Medence homokszűrő"
  #  register_type: coil
  #  restore_mode: RESTORE_DEFAULT_OFF
