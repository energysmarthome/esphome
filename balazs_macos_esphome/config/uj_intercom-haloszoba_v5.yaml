# =============================================================================
# FONT
# =============================================================================
font:
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
    id: font_response
    size: 15
    glyphsets:
      - ${font_glyphsets}
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
    id: font_timer
    size: 30
    glyphs: "0123456789:"
  - file:
      type: gfonts
      family: ${font_family}
      weight: 600
    id: font_clock
    size: 20
    glyphs: "0123456789:%"
    extras:
      - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
        glyphs:
          - "\U000F0079" # battery-100
          - "\U000F008E" # battery-alert (0%)
          - "\U000F007A" # battery-10
          - "\U000F007B" # battery-20
          - "\U000F007C" # battery-30
          - "\U000F007D" # battery-40
          - "\U000F007E" # battery-50
          - "\U000F007F" # battery-60
          - "\U000F0080" # battery-70
          - "\U000F0081" # battery-80
          - "\U000F0082" # battery-90
          - "\U000F0553" # battery-charging-100
          - "\U000F089F" # battery-charging-outline (0%)
          - "\U000F089C" # battery-charging-10
          - "\U000F0086" # battery-charging-20
          - "\U000F0087" # battery-charging-30
          - "\U000F0088" # battery-charging-40
          - "\U000F089D" # battery-charging-50
          - "\U000F0089" # battery-charging-60
          - "\U000F089E" # battery-charging-70
          - "\U000F008A" # battery-charging-80
          - "\U000F008B" # battery-charging-90
          - "\U000F08BF" # wifi-strength-outline (<20%)
          - "\U000F08BC" # wifi-strength-1 (<55%)
          - "\U000F08BD" # wifi-strength-2 (<80%)
          - "\U000F08BE" # wifi-strength-3 (>=80%)
          - "\U000F07D0" # home-assistant (HA connected)
          - "\U000F15D0" # home-alert (HA disconnected)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: ic_icons
    size: 42
    glyphs:
      - "\U000F03F2" # phone
      - "\U000F03F5" # phone-hangup
      - "\U000F0731" # arrow left bold
      - "\U000F0734" # arrow right bold
  # Intercom fonts
  - file:
      type: gfonts
      family: ${font_family}
      weight: 700
    id: font_title
    size: 24
    glyphsets:
      - GF_Latin_Core
    extras:
      - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
        glyphs:
          - "\U000F06CB" # contacts (address book)
  - file:
      type: gfonts
      family: ${font_family}
      weight: 500
    id: font_state
    size: 28
    # Static IC labels only: IDLE, RINGING, CALLING, IN CALL.
    # Explicit glyphs save ~150 KB flash vs GF_Latin_Core (319 glyphs).
    glyphs: " ACDEGILNR"
  - file:
      type: gfonts
      family: ${font_family}
      weight: 400
    id: font_info
    size: 20
    glyphsets:
      - GF_Latin_Core
  - file:
      type: gfonts
      family: Roboto Mono
      weight: 400
    id: font_page_counter
    size: 14
    glyphs: "0123456789/"

# =============================================================================
# TOUCHSCREEN (CST816)
# =============================================================================
touchscreen:
  - platform: cst816
    id: touch
    display: s3_box_lcd
    i2c_id: touchscreen_i2c_bus
    interrupt_pin: GPIO12
    reset_pin: GPIO6
    on_touch:
      - script.execute: backlight_timer
      - if:
          condition:
            switch.is_on: timer_ringing
          then:
            - switch.turn_off: timer_ringing
    # Gestures handled natively by LVGL on each page (on_swipe_up/down/left/right);
    # no manual dx/dy lambda needed. on_touch above is kept for backlight refresh.

# =============================================================================
# SPI BUS (DISPLAY)
# =============================================================================
spi:
  - id: spi_bus
    clk_pin: 4
    mosi_pin: 2

# =============================================================================
# DISPLAY (mipi_spi - LVGL handles rendering)
# =============================================================================
display:
  - platform: mipi_spi
    id: s3_box_lcd
    model: GC9A01A
    invert_colors: true
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 47
    reset_pin:
      number: 38
    auto_clear_enabled: false
    dimensions:
      height: 240
      width: 240

# =============================================================================
# LVGL DISPLAY ENGINE
#
# Declarative widgets for VA + intercom pages. Static idle image,
# mood-based replying backgrounds, timer overlay on top_layer.
# =============================================================================
lvgl:
  displays:
    - s3_box_lcd
  buffer_size: 50%
  color_depth: 16
  log_level: WARN
  top_layer:
    widgets:
      # Timer overlay bar (hidden by default, shown on idle/listening/thinking/muted)
      # Dimensions set by reposition_widgets from y_metrics[13] and y_metrics[2]
      - obj:
          id: timer_overlay
          align: TOP_MID
          width: 1
          height: 1
          bg_color: 0xFFFFFF
          border_color: 0x000000
          border_width: 1
          hidden: true
          widgets:
            - bar:
                id: timer_bar
                align: CENTER
                width: 1
                height: 1
                min_value: 0
                max_value: 100
                value: 50
                indicator:
                  bg_color: 0x26ED3A
            - label:
                id: timer_label
                align: CENTER
                text: ""
                text_color: 0x000000
                text_font: font_timer
      # Clock + battery/wifi status bar (always visible)
      - label:
          id: top_clock_label
          align: TOP_MID
          y: 90%
          text: ""
          text_color: 0xFFFFFF
          text_font: font_clock
      - label:
          id: top_battery_label
          align: TOP_MID
          y: 82%
          text: ""
          text_color: 0xFFFFFF
          text_font: font_clock
  pages:
    # ========================================================================
    # INITIALIZATION PAGE
    # ========================================================================
    - id: initializing_page
      bg_color: 0x000000
      widgets:
        - image:
            align: CENTER
            src: assistant_gui_initializing

    # ========================================================================
    # VA: IDLE PAGE
    # ========================================================================
    - id: idle_page
      bg_color: 0x000000
      on_swipe_up:
        - script.execute: swipe_to_intercom
      widgets:
        # Idle animation: fwd 0→19 + 2s hold + bwd 18→0 = 55 frames @ 120ms = 6.6s
        - animimg:
            id: idle_anim
            align: CENTER
            width: 240
            height: 240
            src:
              - idle_00
              - idle_01
              - idle_02
              - idle_03
              - idle_04
              - idle_05
              - idle_06
              - idle_07
              - idle_08
              - idle_09
              - idle_10
              - idle_11
              - idle_12
              - idle_13
              - idle_14
              - idle_15
              - idle_16
              - idle_17
              - idle_18
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_18
              - idle_17
              - idle_16
              - idle_15
              - idle_14
              - idle_13
              - idle_12
              - idle_11
              - idle_10
              - idle_09
              - idle_08
              - idle_07
              - idle_06
              - idle_05
              - idle_04
              - idle_03
              - idle_02
              - idle_01
            duration: 6600ms
            auto_start: false

    # ========================================================================
    # VA: LISTENING PAGE (placeholder)
    # ========================================================================
    - id: listening_page
      bg_color: 0xFFFFFF
      on_swipe_up:
        - script.execute: swipe_to_intercom
      widgets:
        - image:
            align: CENTER
            src: assistant_gui_listening

    # ========================================================================
    # VA: THINKING PAGE (chord-width text, same layout as replying)
    # Text starts at row total_rows/2-3 (around row 2), matching original
    # ========================================================================
    - id: thinking_page
      bg_color: 0xFFFFFF
