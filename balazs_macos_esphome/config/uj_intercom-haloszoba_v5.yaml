# GRAPHIC RESOURCES
# =============================================================================
image:
  # Static VA state images
  - file: ${assets_base}assets/images/assistant/${ai_avatar}/error.png
    id: assistant_gui_error
    resize: 240x240
    type: RGB565
    transparency: alpha_channel
  - file: ${assets_base}assets/images/assistant/${ai_avatar}/listening.png
    id: assistant_gui_listening
    resize: 240x240
    type: RGB565
    transparency: alpha_channel
  - file: ${assets_base}assets/images/assistant/${ai_avatar}/thinking.png
    id: assistant_gui_thinking
    resize: 240x240
    type: RGB565
    transparency: alpha_channel
  - file: ${assets_base}assets/images/assistant/${ai_avatar}/timer_finished.png
    id: assistant_gui_timer_finished
    resize: 240x240
    type: RGB565
    transparency: alpha_channel
  - file: ${assets_base}assets/images/assistant/${ai_avatar}/loading.png
    id: assistant_gui_initializing
    resize: 240x240
    type: RGB565
    transparency: alpha_channel
  - file: ${assets_base}assets/images/assistant/${ai_avatar}/error_no_wifi.png
    id: error_no_wifi
    resize: 240x240
    type: RGB565
    transparency: alpha_channel
  - file: ${assets_base}assets/images/assistant/${ai_avatar}/error_no_ha.png
    id: error_no_ha
