# =============================================================================
# SPOTPEAR BALL V2 - VOICE ASSISTANT + INTERCOM + WAKE WORD (esp_afe pipeline)
# =============================================================================
# Target board: Spotpear Ball v2 (ESP32-S3 with GC9A01A 240x240 round display,
# ES8311 mono codec, CST816 touch, GPIO0 button).
#
# Audio pipeline (esp_audio_stack @ 48 kHz, stereo AEC reference):
#
#   I2S RX 48kHz stereo -> L=mic R=ref -> esp_ae_rate_cvt x3 -> esp_afe (AEC+NS+AGC) -> mic_afe -> VA / Intercom TX / MWW
#
#   Music/radio → media_speaker (resampler) ───────────┐
#   VA TTS      → tts_speaker (resampler) ─────────────┼── mixer (48kHz) → hw_speaker → ES8311
#   Intercom RX → intercom_speaker (resampler) ────────┘
#
# Single GPIO0 button, page-aware:
#   VA idle           : click=start VA      | long (1-3s)=switch to intercom
#   VA active         : click=stop VA
#   Intercom idle     : click=call          | double=next contact | long=switch to VA
#   Intercom ring in  : click=answer        | double=decline      | long=switch to VA
#   Intercom ring out : click=hangup        | long=switch to VA
#   Intercom in call  : click=hangup        | long=switch to VA
#   Timer ringing     : click=stop timer (any page)
# =============================================================================

substitutions:
  # Hardware-shared identity: all Spotpear Ball v2 firmware variants (intercom / full-afe
  # / full-afe) share `spotpear-ball-v2` so a flash swap reuses the same HA device entity
  # and the same .esphome/build cache.
  name: intercom-haloszoba
  friendly_name: Intercom Hálószoba
  mic_id: mic_afe
  afe_vad_restore_mode: ALWAYS_OFF

  ext_components_source: "github://n-IA-hane/esphome-intercom@main"

  assets_base: "https://github.com/n-IA-hane/esphome-intercom/raw/main/"

  # AI avatar folder (${assets_base}assets/images/assistant/<ai_avatar>/)
  ai_avatar: default

  # IC layout proportions (relative to display_height)
  ic_btn_size: "25%"
  ic_btn_offset: "2%"
  ic_btn_below_center: "19%"   # cornetta center between peer (50%) and battery overlay (82%)
  ic_contacts_y: "31%"         # idle phonebook icon: visual midway between IDLE label (~y=58) and peer (~y=120)
  # Round 240x240 GC9A01: peer label widths derived from circle chord at the label's y.
  ic_peer_width: "224"               # chord at y=120 (centre) minus 12 px side margin: idle/ringing_out/in_call
  ic_ringing_in_peer_width: "139"    # ic_ringing_in only: answer/decline buttons sit at LEFT_MID/RIGHT_MID at y=120
  ic_title_width: "116"              # device-name title at y≈19 (8%): chord minus 12 px margin
  ic_ended_text_width: "187"         # ic_ended_page "Call ended" (y≈53) and "Reason:" (y≈139) labels: chord minus 12 px margin
  ic_ended_reason_text_width: "177"  # ic_ended_page reason text (dynamic) at y≈168: chord minus 12 px margin (above top_battery_label at y=197)
  # Settings page widths for the round 240x240 panel.
  ic_settings_row_width: "170"
  ic_settings_wide_width: "190"
  ic_settings_mid_width: "170"
  ic_settings_narrow_width: "150"
  ic_settings_dropdown_width: "170"
  ic_settings_slider_height: "12"
  ic_settings_switch_width: "50"
  ic_settings_switch_height: "26"
  ic_settings_label_font: font_info
  ic_settings_pad_row: "6"

  voice_assist_idle_phase_id: "1"
  voice_assist_listening_phase_id: "2"
  voice_assist_thinking_phase_id: "3"
  voice_assist_replying_phase_id: "4"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  voice_assist_muted_phase_id: "12"
  voice_assist_timer_finished_phase_id: "20"

  # Font configuration
  font_glyphsets: "GF_Latin_Core"
  font_family: Figtree

  # Display constants
  display_width: "240"
  display_height: "240"

  # Stealth listen target. The helper keeps this transport non-blocking,
  # so VA, wake word, media playback and intercom are not intentionally stopped.
  stealth_stream_host: "192.168.22.202"
  stealth_stream_port: "12345"

packages:
  core: github://n-IA-hane/esphome-intercom/packages/va_intercom.yaml@main
  ota_maintenance: github://n-IA-hane/esphome-intercom/packages/ota/full_audio_lvgl_maintenance.yaml@main
  intercom_transport: github://n-IA-hane/esphome-intercom/packages/intercom/transport_tcp.yaml@main
  phonebook_subscribe: github://n-IA-hane/esphome-intercom/packages/intercom/phonebook_subscribe.yaml@main
  s3_base: github://n-IA-hane/esphome-intercom/packages/platform/esp32s3_base.yaml@main
  native_diagnostics: github://n-IA-hane/esphome-intercom/packages/diagnostics/native.yaml@main
  status_led: github://n-IA-hane/esphome-intercom/packages/led/status_spotpear_ball_v2.yaml@main
  afe_entities: github://n-IA-hane/esphome-intercom/packages/esp_afe/single_mic_entities.yaml@main
  audio_stack_controls: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/controls.yaml@main
  speaker_power: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/speaker_power_output.yaml@main
  speaker_mixer: github://n-IA-hane/esphome-intercom/packages/audio/full_mono_mixer_48k.yaml@main
  flac_codecs_psram: github://n-IA-hane/esphome-intercom/packages/audio/flac_codecs_psram.yaml@main
  lvgl_settings_nav: github://n-IA-hane/esphome-intercom/packages/lvgl/lvgl_settings_navigation.yaml@main
  lvgl_settings_sync_volumes: github://n-IA-hane/esphome-intercom/packages/lvgl/lvgl_settings_sync_volumes.yaml@main
  lvgl_settings_sync_mute: github://n-IA-hane/esphome-intercom/packages/lvgl/lvgl_settings_sync_mute.yaml@main
  lvgl_settings_sync_aec: github://n-IA-hane/esphome-intercom/packages/lvgl/lvgl_settings_sync_aec.yaml@main
  lvgl_settings_sync_va: github://n-IA-hane/esphome-intercom/packages/lvgl/lvgl_settings_sync_va.yaml@main
  spotpear_intercom_nav: github://n-IA-hane/esphome-intercom/packages/lvgl/spotpear_intercom/nav_full.yaml@main

# =============================================================================
# ESP32 BASE CONFIGURATION
# =============================================================================
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  includes:
    - stealth_go2rtc_pcma_v2.h
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: backlight
          brightness: 100%
      - script.execute: compute_layout_metrics
      - script.execute: reposition_widgets
      # Settings is a single vertical scroll page. Intercom swipe-up opens it;
      # swipe-down at scroll top returns to Intercom.
      - lambda: |-
          id(g_settings_pages).clear();
          id(g_settings_pages).push_back(id(settings_continuous_page)->obj);
      - script.execute: draw_display
      - script.execute: backlight_timer
      - micro_wake_word.stop:
      - delay: 1s
      - lambda: id(peer_name) = id(intercom).get_current_destination();
      - delay: 30s
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - globals.set:
                id: init_in_progress
                value: 'false'
            - script.execute: draw_display
            - script.execute: start_mww_when_ready

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      # -O2 codegen on our audio components: 5-15 % throughput on tight loops
      # (deinterleave, rate conversion, gain/scale, RMS) at the cost of +30-80 KB flash
      # and slightly higher stack peaks. Flash headroom is ~1.9 MB on this
      # build, audio_task stack has its own headroom from task_stack_size.
      compiler_optimization: PERF
    sdkconfig_options:
      # Keep TLS handshake/config memory short-lived on full audio builds.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_DYNAMIC_FREE_CONFIG_DATA: "y"
      CONFIG_MBEDTLS_DYNAMIC_FREE_CA_CERT: "y"

psram:
  mode: octal
  speed: 80MHz

# =============================================================================
# EXTERNAL COMPONENTS
# =============================================================================
# Remote:
external_components:
  - source: ${ext_components_source}
    components: [intercom_api, esp_audio_stack, esp_afe, audio_processor]

# =============================================================================
# CONNECTIVITY
# =============================================================================
api:
  on_client_connected:
    - script.execute: draw_display
ota:
  - platform: esphome
    id: ota_esphome
    password: "e3888f9547c405b2fe1cede2b4fd8fe3"

logger:
  hardware_uart: USB_SERIAL_JTAG
  # DEBUG keeps PBX-lite signaling + AEC/i2s lifecycle visible.
  # Mute chatty ESPHome built-ins below; project components stay at DEBUG.
  level: INFO
  logs:
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN

network:
  enable_high_performance: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # ESP32 defaults to LIGHT power save; on full audio builds that can leave
  # the STA associated while ARP/API traffic stops. Keep realtime devices awake.
  manual_ip:
    static_ip: 192.168.22.189
    gateway: 192.168.22.1
    subnet: 255.255.255.0
  power_save_mode: NONE
  ap:
    ssid: "Intercom Haloszoba Hotspot"
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:

time:
  - platform: sntp
    id: my_time
    timezone: Europe/Rome
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

# =============================================================================
# I2C BUS (ES8311 codec control)
# =============================================================================
i2c:
  - id: i2c_bus
    sda: GPIO15
    scl: GPIO14
    scan: false
  - id: touchscreen_i2c_bus
    sda: GPIO11
    scl: GPIO7
    scan: false

# =============================================================================
# ESP AFE
# Official Espressif AFE path for one microphone plus one playback reference.
# Spotpear supplies that reference as the ES8311 stereo right channel.
# =============================================================================
esp_afe:
  id: afe_processor
  type: fd
  mode: low_cost
  mic_num: 1
  aec_enabled: true
  aec_filter_length: 4
  aec_nlp_level: normal
  se_enabled: false
  ns_enabled: true
  vad_enabled: false
  continuous_vad: true
  agc_enabled: true
  memory_alloc_mode: more_psram
  task_core: 1
  task_priority: 5
  ringbuf_size: 8
  feed_task_core: 0
  feed_task_priority: 5
  feed_task_stack_size: 3072
  fetch_task_core: 1
  fetch_task_priority: 5
  fetch_task_stack_size: 3072
  feed_buf_in_psram: false
  feed_ring_in_psram: true
  fetch_ring_in_psram: false

# =============================================================================
# ESP AUDIO STACK (single bus for ES8311)
# Full-duplex I2S: mic + speaker on same bus, managed by one FreeRTOS task.
# Audio task defaults come from the component; this preset keeps the
# single-bus ES8311 path simple and relies on stereo loopback reference.
# Bus runs at 48kHz (ES8311 native rate, better DAC quality).
# Espressif rate conversion x3 produces 16kHz for mic/AFE/MWW/VA/intercom.
# =============================================================================
esp_audio_stack:
  id: audio_stack
  i2s_lrclk_pin: GPIO45
  i2s_bclk_pin: GPIO9
  i2s_mclk_pin: GPIO16
  i2s_din_pin: GPIO10
  i2s_dout_pin: GPIO8
  sample_rate: 48000             # I2S bus rate (ES8311 native)
  output_sample_rate: 16000      # Mic/AEC/MWW/VA output rate
  processor_id: afe_processor
  audio_effects:
    rate_cvt_complexity: 3
    rate_cvt_perf_type: speed
  num_channels: 2               # Drive DACL speaker and DACR AEC reference
  codec:
    i2c_id: i2c_bus
    input:
      type: es8311
      address: 0x18
      gain_db: 24.0
      use_mclk: true
      no_dac_ref: false
    output:
      type: es8311
      address: 0x18
      use_mclk: true
      no_dac_ref: false
  # ES8311 digital feedback through the official codec driver: RX left is
  # ADC mic and RX right is DACR reference when no_dac_ref is false.
  # Sample-accurate reference alignment, no ring buffer delay needed.
  use_stereo_aec_reference: true
  reference_channel: right
  buffers_in_psram: true       # All audio buffers in PSRAM; required for 512-sample AEC frames
  audio_task_stack_in_psram: true   # Full VA + MWW + API needs internal heap headroom; keep only DMA/ESP-SR scratch internal.

# =============================================================================
# MICROPHONE
# Single mic_afe: processed AEC output for all consumers (VA STT, intercom TX, MWW).
# No separate unprocessed microphone path is exposed.
# =============================================================================
microphone:
  - platform: esp_audio_stack
    id: mic_afe
    esp_audio_stack_id: audio_stack

  # Stealth listen tap: post-AFE / post-AEC microphone stream.
  # This is intentionally a separate capture handle so the normal mic_afe user
  # path (VA + MWW + intercom TX) stays untouched.
  - platform: esp_audio_stack
    id: mic_stealth
    esp_audio_stack_id: audio_stack
    on_data:
      then:
        - lambda: |-
            if (!id(stealth_listen_enabled)) return;
            stealth_udp_send_(x);

# =============================================================================
# SPEAKERS (mixer topology: sources -> resampler -> mixer 48kHz -> hw_speaker)
# hw_speaker runs at 48kHz (bus rate). ResamplerSpeaker upsamples any input.
# =============================================================================
speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000

# =============================================================================
# MEDIA PLAYER (separate pipelines: media vs TTS announcement)
# =============================================================================
media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    internal: false
    task_stack_in_psram: true
    # ESPHome media_player volume and board `master_volume` are cascaded by
    # esp_audio_stack instead of sharing the same speaker volume slot.
    volume_initial: 100%
    volume_min: 0%
    volume_max: 100%
    volume_increment: 5%
    buffer_size: 262144   # 256KB per pipeline (default 1MB is oversized under full load)
    media_pipeline:
      speaker: media_speaker
      sample_rate: 48000
      format: FLAC
    announcement_pipeline:
      speaker: tts_speaker
      format: FLAC
      sample_rate: 48000
    files:
      - id: timer_finished_sound
        file: ${assets_base}assets/sounds/timer_finished.flac
      - id: intercom_ringing_sound
        file: ${assets_base}assets/sounds/ringtone.flac
    on_announcement:
      - script.execute: update_status
      # Only show LED for announcements when intercom is idle
      # During intercom calls, keep current intercom LED state
      - if:
          condition:
            intercom_api.is_idle: intercom
          then:
            - light.turn_on:
                id: status_led
                brightness: 100%
                red: 0.00
                green: 0.00
                blue: 1.00
      # Set replying phase for non-VA announcements (e.g., timer sound)
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - globals.set:
                id: voice_assistant_phase
                value: '${voice_assist_replying_phase_id}'
            - script.execute: update_replying_text
            - script.execute: draw_display
    on_play:
      - logger.log:
          tag: mp
          format: "MP: on_play"
      - script.execute: update_status
      - script.execute: backlight_timer
      # Keep the display in its neutral media state while playback owns audio.
      - if:
          condition:
            and:
              - intercom_api.is_idle: intercom
              - not:
                  voice_assistant.is_running:
          then:
            - lambda: |-
                // Clear previous VA text and show the neutral mood image.
                id(wrapped_lines_reply).clear();
                id(reply_total_pages) = 1;
                id(reply_page_index) = 0;
                lv_img_set_src(id(mood_bg), id(mood_neutral));
            - script.execute: update_replying_text
            - globals.set:
                id: voice_assistant_phase
                value: '${voice_assist_replying_phase_id}'
            - script.execute: draw_display
    on_pause:
      # PAUSED is a real media_player state; update the UI here because
      # on_idle only runs after stop/finish.
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_idle_phase_id}'
      - script.execute: update_status
      - script.execute: draw_display
      - script.execute: backlight_timer
    on_idle:
      - logger.log:
          tag: mp
          format: "MP: on_idle (phase=%d, va_state=%d)"
          args: ['id(voice_assistant_phase)', 'id(g_va_state)']
      - delay: 200ms
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_idle_phase_id}'
      - script.execute: update_status
      - script.execute: draw_display
      - script.execute: backlight_timer

# =============================================================================
# WAKE WORD & VOICE ASSISTANT
#
# MWW always-on (stop_after_detection: false) on mic_afe.
# SR linear AEC preserves spectral features for neural detection (10/10).
# Ducking managed centrally: acquire in on_wake_word_detected, release in va_end_handler.
# =============================================================================
micro_wake_word:
  id: mww
  microphone: mic_afe    # Post-AEC: SR linear AEC preserves spectral features
  stop_after_detection: false
  models:
    - model: alexa

voice_assistant:
  id: va
  microphone: mic_afe
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 0   # Standalone ESP-SR AEC path only
  auto_gain: 0dBFS             # Keep gain fixed for AEC/MWW stability
  volume_multiplier: 2.0
  on_timer_started:
    - script.execute: update_timer_state
  on_timer_cancelled:
    - script.execute: update_timer_state
  on_timer_updated:
    - script.execute: update_timer_state
  on_timer_tick:
    - script.execute: update_timer_state
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - globals.set:
        id: voice_assistant_phase
        value: '${voice_assist_timer_finished_phase_id}'
    - script.execute: draw_display

# =============================================================================
# INTERCOM API (TCP-based, port 6054)
# =============================================================================
intercom_api:
  task_stacks_in_psram: true   # save ~28KB internal heap on S3 PSRAM builds by placing task stacks in PSRAM
  buffers_in_psram: true # Intercom staging buffers in PSRAM; AEC/AFE buffers live in esp_audio_stack
  id: intercom
  microphone: mic_afe
  speaker: intercom_speaker
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1
  # Idle screen refresh hook: each merge cycle ends with publish_destination_,
  # so re-render so peer name + contact count reflect the new roster.
  on_update_contacts:
    - lambda: id(peer_name) = id(intercom).get_current_destination();
    - script.execute: update_ic_idle_labels
  on_destination_changed:
    - lambda: id(peer_name) = id(intercom).get_current_destination();
    - script.execute: update_ic_idle_labels
    - script.execute: draw_display

# =============================================================================
# GLOBALS
# =============================================================================
globals:
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}

  # Mode: 0=VA, 1=Intercom
  - id: current_mode
    type: int
    restore_value: no
    initial_value: "0"

  # Animation hint for the next draw_display call. 0 = LV_SCR_LOAD_ANIM_NONE
  # (instant lv_disp_load_scr). Non-zero = LVGL anim type (e.g. MOVE_TOP),
  # consumed and reset back to 0 on use. Set by swipe_to_intercom/swipe_to_va
  # so a swipe-driven page change is animated, while every other caller
  # (long-press toggle, intercom state callbacks, etc.) stays instant.
  - id: nav_anim
    type: int
    restore_value: no
    initial_value: "0"
  - id: nav_anim_ms
    type: int
    restore_value: no
    initial_value: "0"

  # Previous mode (for restoring after incoming call)
  - id: previous_mode
    type: int
    restore_value: no
    initial_value: "0"

  # Intercom peer name for display
  - id: peer_name
    type: std::string
    restore_value: no
    initial_value: '""'

  # Replying page pagination
  - id: reply_page_index
    type: int
    restore_value: false
    initial_value: "0"
  - id: reply_total_pages
    type: int
    restore_value: false
    initial_value: "1"
  - id: wrapped_lines_reply
    type: std::vector<std::string>
    restore_value: false

  # ic_ended_page is shown briefly after a call terminates (hangup,
  # decline, error, timeout). Set by ui_ic_ended, cleared by the
  # auto-return delay or by the next state change.
  - id: ic_ended_active
    type: bool
    restore_value: false
    initial_value: "false"

  # Chord widths for circular text wrapping (computed at boot)
  - id: chord_widths_cache
    type: std::vector<int>
    restore_value: false
  # Text row y-positions for circular display (computed at boot)
  - id: text_row_y
    type: std::vector<int>
    restore_value: false
  # UI grid y-positions (proportional, computed at boot from display height)
  # [0]=top, [1]=center, [2]=height, [3]=title, [4]=subtitle, [5]=state,
  # [6]=label, [7]=info, [8]=contacts, [9]=action_hint, [10]=bottom_info,
  # [11]=bottom_status, [12]=page_counter, [13]=timer_box_height
  - id: y_metrics
    type: std::vector<int>
    restore_value: false

  # Stealth listen state only gates the extra stream.
  # It must not change display mode, LED state, mute state, VA, MWW or intercom state.
  - id: stealth_listen_enabled
    type: bool
    restore_value: no
    initial_value: "false"

# =============================================================================
# SCRIPTS
# =============================================================================
script:
  - id: stealth_listen_start
    mode: restart
    then:
      - lambda: |-
          id(stealth_listen_enabled) = true;
          stealth_udp_begin_("${stealth_stream_host}", atoi("${stealth_stream_port}"));
      - microphone.capture:
          id: mic_stealth

  - id: stealth_listen_stop
    mode: restart
    then:
      - microphone.stop_capture:
          id: mic_stealth
      - lambda: |-
          id(stealth_listen_enabled) = false;
          stealth_udp_end_();

  # Display cleanup after VA ends (extends package placeholder)
  - id: !extend va_end_cleanup
    then:
      - script.stop: reply_pagination_timer
      - script.execute: backlight_timer
      - text_sensor.template.publish:
          id: text_request
          state: ""
      - text_sensor.template.publish:
          id: text_response
          state: ""
      - lambda: |-
          id(wrapped_lines_reply).clear();
          id(reply_total_pages) = 1;
          id(reply_page_index) = 0;
      - script.execute: update_replying_text
      - script.execute: set_idle_or_mute_phase
      - script.execute: draw_display

  # Spotpear Ball v2 LED patterns (extends empty package placeholder)
  - id: !extend update_led
    then:
      - lambda: |-
          static int last = -2;
          int t = id(g_applied_led);
          if (t == last) return;
          last = t;
          auto *led = id(status_led);
          switch (t) {
            case 1:  // Both muted: red slow pulse
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.4f).set_effect("Slow Pulse").perform();
              break;
            case 2:  // Mic muted: red dim
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.3f).set_effect("None").perform();
              break;
            case 3:  // Speaker muted: orange dim
              led->turn_on().set_rgb(1.0f, 0.5f, 0.0f).set_brightness(0.3f).set_effect("None").perform();
              break;
            case 4:  // MWW recent / barge-in: green slow pulse
            case 5:  // VA Listening: green slow pulse
              led->turn_on().set_rgb(0.0f, 1.0f, 0.0f).set_brightness(0.7f).set_effect("Slow Pulse").perform();
              break;
            case 6:  // VA Thinking: orange fast pulse
              led->turn_on().set_rgb(1.0f, 1.0f, 0.0f).set_brightness(0.7f).set_effect("Fast Pulse").perform();
              break;
            case 7:  // VA Speaking: blue solid
              led->turn_on().set_rgb(0.0f, 0.0f, 1.0f).set_brightness(1.0f).set_effect("None").perform();
              break;
            case 8:  // IC Ringing: red strobe
              led->turn_on().set_effect("Ringing").perform();
              break;
            case 9:  // IC Outgoing: orange strobe
              led->turn_on().set_effect("Calling").perform();
              break;
            case 10: // IC Streaming: green solid
              led->turn_on().set_rgb(0.0f, 1.0f, 0.0f).set_brightness(1.0f).set_effect("None").perform();
              break;
            case 11: // VA Error: red solid
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.7f).set_effect("None").perform();
              break;
            case 12: // Media playing: blue solid
              led->turn_on().set_rgb(0.0f, 0.0f, 1.0f).set_brightness(1.0f).set_effect("None").perform();
              break;
            default: // Off
              led->turn_off().perform();
              break;
          }

  # Display state routing (extends package placeholder)
  # Maps g_applied_led to voice_assistant_phase and calls draw_display.
  # Also handles intercom idle restoration and backlight.
  - id: !extend ui_state_changed
    then:
      - lambda: |-
          int led = id(g_applied_led);
          // Intercom idle: restore previous mode after call ends
          if (led == 0 && id(current_mode) == 1 && id(intercom).get_state_str() == "Idle") {
            id(peer_name) = id(intercom).get_current_destination();
            if (id(previous_mode) == 0) {
              id(current_mode) = 0;
            }
          }
          // Map LED state to voice_assistant_phase
          switch (led) {
            case 0:  // Idle
              if (!api::global_api_server->is_connected()) {
                id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
              } else if (id(mute).state) {
                id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
              } else if (id(speaker_media_player).state == media_player::MEDIA_PLAYER_STATE_PLAYING) {
                lv_img_set_src(id(mood_bg), id(mood_neutral));
                id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              } else {
                id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              }
              break;
            case 1:  // Both muted
            case 2:  // Mic muted
              id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
              break;
            case 4:  // MWW recent / barge-in
            case 5:  // VA Listening
              id(current_mode) = 0;
              id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
              break;
            case 6:  // VA Thinking
              id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
              break;
            case 7:  // VA Speaking (text set by ui_tts_started)
              id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              break;
            case 11: // VA Error
              id(voice_assistant_phase) = ${voice_assist_error_phase_id};
              break;
            case 12: // Media playing
              if (id(mute).state) {
                id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
              } else {
                lv_img_set_src(id(mood_bg), id(mood_neutral));
                id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              }
              break;
            default:
              break;
          }
      - script.execute: backlight_timer
      # Reset text on listening start
      - if:
          condition:
            lambda: 'return id(g_applied_led) == 5;'
          then:
            - text_sensor.template.publish:
                id: text_request
                state: "..."
            - text_sensor.template.publish:
                id: text_response
                state: "..."
            - script.stop: reply_pagination_timer
      # Intercom idle: update labels if staying in IC mode
      - if:
          condition:
            lambda: |-
              return id(g_applied_led) == 0 && id(current_mode) == 1
                     && id(intercom).get_state_str() == "Idle";
          then:
            - script.execute: update_ic_idle_labels
      - script.execute: draw_display

  # TTS text display (extends package placeholder)
  - id: !extend ui_tts_started
    then:
      # Parse emoticon prefix, set mood background, strip from displayed text.
      - lambda: |-
          std::string t = text;
          esphome::image::Image *mood = id(mood_neutral);
          if (t.size() >= 3) {
            std::string prefix = t.substr(0, 3);
            if (prefix == ":-)") {
              mood = id(mood_happy);
            } else if (prefix == ":-(") {
              mood = id(mood_angry);
            } else if (prefix == ":-|") {
              // neutral (default)
            }
            if (prefix == ":-)" || prefix == ":-(" || prefix == ":-|") {
              t = t.substr(3);
              if (!t.empty() && t[0] == ' ') t = t.substr(1);
            }
          }
          lv_img_set_src(id(mood_bg), mood);
          id(text_response).publish_state(t);
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_replying_phase_id}'
      - globals.set:
          id: reply_page_index
          value: '0'
      - script.stop: reply_pagination_timer
      - script.stop: backlight_timer
      - light.turn_on:
          id: backlight
          brightness: 100%
      - if:
          condition:
            lambda: |-
              return id(current_mode) == 0;
          then:
            - script.execute: update_replying_text
            - if:
                condition:
                  lambda: |-
                    return id(reply_total_pages) > 1;
                then:
                  - script.execute: reply_pagination_timer
            - script.execute: draw_display

  # STT text display (extends package placeholder)
  - id: !extend ui_stt_ended
    then:
      - text_sensor.template.publish:
          id: text_request
          state: !lambda 'return text;'
      - script.execute: draw_display

  # Intercom call display (extends package placeholder)
  - id: !extend ui_ic_call
    then:
      - script.stop: ai_animation_loop
      - script.stop: reply_pagination_timer
      - lambda: |-
          id(peer_name) = peer;
          id(previous_mode) = id(current_mode);
          id(current_mode) = 1;
      - script.execute: backlight_timer
      # Update the relevant peer label for whichever IC page will show
      - lvgl.label.update:
          id: ic_ringing_out_peer_label
          text: !lambda 'return id(peer_name);'
      - lvgl.label.update:
          id: ic_ringing_in_peer_label
          text: !lambda 'return id(peer_name);'
      - lvgl.label.update:
          id: ic_in_call_peer_label
          text: !lambda 'return id(peer_name);'
      - script.execute: draw_display

  # Call terminated screen: render peer + reason on ic_ended_page,
  # gate draw_display via ic_ended_active for the auto-return window.
  - id: !extend ui_ic_ended
    mode: restart
    then:
      - globals.set:
          id: ic_ended_active
          value: "true"
      - lvgl.label.update:
          id: ic_ended_peer_label
          text: !lambda 'return peer.empty() ? std::string("-") : peer;'
      - lvgl.label.update:
          id: ic_ended_reason_label
          text: !lambda |-
            std::string r = reason;
            if      (r == "local_hangup")    return std::string("Local hangup");
            else if (r == "remote_hangup")   return std::string("Remote hangup");
            else if (r == "declined")        return std::string("Declined");
            else if (r == "timeout")         return std::string("Timeout");
            else if (r == "busy")            return std::string("Busy");
            else if (r == "unreachable")     return std::string("Unreachable");
            else if (r == "protocol_error")  return std::string("Protocol error");
            else if (r == "bridge_error")    return std::string("Bridge error");
            return r.empty() ? std::string("Ended") : ("Declined: " + r);
      - lvgl.page.show: ic_ended_page
      - script.execute: backlight_timer
      - delay: 4s
      - if:
          condition:
            lambda: 'return id(ic_ended_active);'
          then:
            - globals.set:
                id: ic_ended_active
                value: "false"
            - script.execute: draw_display

  # Idle animation: 38 frames at 120ms = 4.56s, then 25s pause. Repeat while idle.
  - id: ai_animation_loop
    mode: single
    then:
      - lambda: |-
          lv_animimg_set_repeat_count(id(idle_anim), 0);
          lv_animimg_start(id(idle_anim));
          lv_anim_del(id(idle_anim), nullptr);
      - while:
          condition:
            binary_sensor.is_on: is_idle_screen
          then:
            - lambda: lv_animimg_start(id(idle_anim));
            - delay: 25s

  # Compute chord widths and text row positions from display dimensions (once at boot)
  - id: compute_layout_metrics
    then:
      - lambda: |-
          const int w = ${display_width};
          const int h = ${display_height};
          const int r = w / 2;
          const int cy = h / 2;
          const int side_margin = w / 40;
          const int line_h = h / 13;
          const int line_spacing = h / 60;
          const int top_pad = h / 24;
          const int bottom_pad = h / 24;

          // y_metrics: proportional UI grid (same formula as original)
          id(y_metrics).clear();
          id(y_metrics).reserve(14);
          id(y_metrics).push_back(0);            // [0] top
          id(y_metrics).push_back(h / 2);        // [1] center
          id(y_metrics).push_back(h);             // [2] height
          id(y_metrics).push_back(h / 8);         // [3] title
          id(y_metrics).push_back(h * 7 / 24);    // [4] subtitle
          id(y_metrics).push_back(h * 5 / 12);    // [5] state
          id(y_metrics).push_back(h * 13 / 24);   // [6] label
          id(y_metrics).push_back(h * 5 / 8);     // [7] info
          id(y_metrics).push_back(h * 37 / 48);   // [8] contacts
          id(y_metrics).push_back(h * 5 / 6);     // [9] action hint
          id(y_metrics).push_back(h * 41 / 48);   // [10] bottom info
          id(y_metrics).push_back(h - h / 16);    // [11] bottom status
          id(y_metrics).push_back(h - 2);          // [12] page counter
          id(y_metrics).push_back(h * 3 / 20);    // [13] timer box height

          // text_row_y + chord_widths_cache: VA text rows for circular wrapping
          id(text_row_y).clear();
          id(chord_widths_cache).clear();
          int y = top_pad;
          while (y + line_h <= h - bottom_pad) {
            id(text_row_y).push_back(y);
            int mid_y = y + line_h / 2;
            int dy = abs(mid_y - cy);
            int chord_w = 0;
            if (dy < r) {
              chord_w = (int)(2.0f * sqrtf((float)(r * r - dy * dy))) - side_margin * 2;
              if (chord_w < 0) chord_w = 0;
            }
            id(chord_widths_cache).push_back(chord_w);
            y += (line_h + line_spacing);
          }

  # Reposition all widgets using computed y_metrics, text_row_y, chord_widths_cache
  # Called once at boot after compute_layout_metrics. All YAML y/width are placeholders.
  - id: reposition_widgets
    then:
      - lambda: |-
          const auto &ym = id(y_metrics);
          const auto &row_y = id(text_row_y);
          const auto &cw = id(chord_widths_cache);
          if (ym.size() < 14 || row_y.empty()) return;

          // Helper: position label at y_center (original uses TextAlign::CENTER)
          // LVGL TOP_MID: y_top = y_center - font_line_height / 2
          auto set_center_y = [](lv_obj_t* obj, int y_center) {
            const lv_font_t* f = lv_obj_get_style_text_font(obj, LV_PART_MAIN);
            int fh = lv_font_get_line_height(f);
            lv_obj_set_y(obj, y_center - fh / 2);
          };

          // --- IC pages: percentages + align handle positioning, no reposition needed ---

          // --- Thinking page: chord-width labels (10 children after image) ---
          lv_obj_t* think[] = {
            id(think_line_0), id(think_line_1), id(think_line_2), id(think_line_3), id(think_line_4),
            id(think_line_5), id(think_line_6), id(think_line_7), id(think_line_8), id(think_line_9)
          };
          for (size_t i = 0; i < row_y.size() && i < 10; i++) {
            lv_obj_set_y(think[i], row_y[i]);
            lv_obj_set_width(think[i], cw[i]);
          }

          // --- Replying page: chord-width labels ---
          lv_obj_t* reply[] = {
            id(reply_line_0), id(reply_line_1), id(reply_line_2), id(reply_line_3), id(reply_line_4),
            id(reply_line_5), id(reply_line_6), id(reply_line_7), id(reply_line_8), id(reply_line_9)
          };
          for (size_t i = 0; i < row_y.size() && i < 10; i++) {
            lv_obj_set_y(reply[i], row_y[i]);
            lv_obj_set_width(reply[i], cw[i]);
          }

          // Page counter at bottom
          lv_obj_set_y(id(reply_page_counter), ym[12]);

          // Timer overlay: dynamic height from y_metrics[13]
          lv_obj_set_height(id(timer_overlay), ym[13]);
          lv_obj_set_width(id(timer_overlay), ym[2]);  // full width = h (square display)
          lv_obj_set_height(id(timer_bar), ym[13] - 4);
          lv_obj_set_width(id(timer_bar), ym[2] - 4);


  # Main display rendering: single lambda for page routing + animation control
  - id: draw_display
    mode: restart
    then:
      - lambda: |-
          // Determine target page
          lv_obj_t* target = nullptr;
          auto s = id(intercom).get_state_str();
          bool in_call = (s == "Ringing" || s == "Incoming" ||
                          s == "Calling" || s == "Outgoing" ||
                          s == "Streaming" || s == "Answering");
          if (in_call) {
            id(ic_settings_active) = false;  // call interrupts settings view
          }
          // ui_ic_ended owns the screen for ~4 s after a terminated call
          // so the user actually reads the reason.
          if (id(ic_ended_active)) {
            target = id(ic_ended_page)->obj;
          } else if (id(ic_settings_active) && !id(g_settings_pages).empty()) {
            int idx = id(g_settings_index);
            int n = (int) id(g_settings_pages).size();
            if (idx < 0 || idx >= n) idx = 0;
            target = id(g_settings_pages)[idx];
          } else if (id(init_in_progress)) {
            target = id(initializing_page)->obj;
          } else if (!wifi::global_wifi_component->is_connected()) {
            target = id(no_wifi_page)->obj;
          } else if (!api::global_api_server->is_connected()) {
            target = id(no_ha_page)->obj;
          } else if (id(current_mode) == 1) {
            // Intercom mode
            auto s = id(intercom).get_state_str();
            if (s == "Ringing" || s == "Incoming") {
              target = id(ic_ringing_in_page)->obj;
            } else if (s == "Calling" || s == "Outgoing") {
              target = id(ic_ringing_out_page)->obj;
            } else if (s == "Streaming" || s == "Answering") {
              target = id(ic_in_call_page)->obj;
            } else {
              target = id(ic_idle_page)->obj;
            }
          } else {
            // VA mode
            int phase = id(voice_assistant_phase);
            if (phase == ${voice_assist_listening_phase_id}) {
              target = id(listening_page)->obj;
            } else if (phase == ${voice_assist_thinking_phase_id}) {
              target = id(thinking_page)->obj;
            } else if (phase == ${voice_assist_replying_phase_id}) {
              target = id(replying_page)->obj;
            } else if (phase == ${voice_assist_error_phase_id}) {
              target = id(error_page)->obj;
            } else if (phase == ${voice_assist_muted_phase_id}) {
              target = id(muted_page)->obj;
            } else if (phase == ${voice_assist_not_ready_phase_id}) {
              target = id(no_ha_page)->obj;
            } else if (phase == ${voice_assist_timer_finished_phase_id}) {
              target = id(timer_finished_page)->obj;
            } else {
              target = id(idle_page)->obj;
            }
          }

          if (target == nullptr) return;

          const char* page_name = "unknown";
          if (target == id(idle_page)->obj) page_name = "idle";
          else if (target == id(listening_page)->obj) page_name = "listening";
          else if (target == id(thinking_page)->obj) page_name = "thinking";
          else if (target == id(replying_page)->obj) page_name = "replying";
          else if (target == id(error_page)->obj) page_name = "error";
          else if (target == id(muted_page)->obj) page_name = "muted";
          else if (target == id(ic_idle_page)->obj) page_name = "ic_idle";
          else if (target == id(ic_ringing_in_page)->obj) page_name = "ic_ringing_in";
          else if (target == id(ic_ringing_out_page)->obj) page_name = "ic_ringing_out";
          else if (target == id(ic_in_call_page)->obj) page_name = "ic_in_call";
          else if (target == id(ic_ended_page)->obj) page_name = "ic_ended";

          // Skip page load if already showing (avoids redundant SPI transfer)
          bool page_changed = (target != lv_disp_get_scr_act(nullptr));
          if (page_changed) {
            // Stop animation before page switch to prevent split-screen glitch
            lv_anim_del(id(idle_anim), nullptr);
            // Honour swipe-driven animation hint, otherwise instant load.
            if (id(nav_anim) != 0) {
              lv_scr_load_anim(target,
                               (lv_scr_load_anim_t) id(nav_anim),
                               (uint32_t) id(nav_anim_ms),
                               0, false);
            } else {
              lv_disp_load_scr(target);
            }
            // Invalidate screen to ensure full redraw on next LVGL tick
            lv_obj_invalidate(lv_disp_get_scr_act(nullptr));
          }
          // The VA idle animation is stopped before page switches. Start the
          // idle animation loop immediately when VA idle becomes the visible
          // page, instead of waiting for the template binary_sensor refresh.
          if (target == id(idle_page)->obj) {
            if (!id(ai_animation_loop).is_running()) id(ai_animation_loop).execute();
          } else if (id(ai_animation_loop).is_running()) {
            id(ai_animation_loop).stop();
          }
          // Always consume the hint, even if no page change happened.
          id(nav_anim) = 0;
          id(nav_anim_ms) = 0;

          // Hide top layer status bar on replying/thinking pages (text overlap)
          bool show_status = (target != id(replying_page)->obj && target != id(thinking_page)->obj);
          if (show_status) {
            lv_obj_clear_flag(id(top_clock_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(top_battery_label), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(top_clock_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(top_battery_label), LV_OBJ_FLAG_HIDDEN);
          }

      # Update dynamic labels when on idle page
      - if:
          condition:
            binary_sensor.is_on: is_idle_screen
          then:
            - script.execute: update_idle_labels
      # Self-heal: ensure MWW is active when in VA idle (catches any missed restarts)
      - if:
          condition:
            and:
              - lambda: |-
                  return id(current_mode) == 0 &&
                         id(voice_assistant_phase) == ${voice_assist_idle_phase_id} &&
                         !id(init_in_progress);
              - switch.is_off: mute
              - not:
                  media_player.is_announcing:
          then:
            - if:
                condition:
                  not:
                    micro_wake_word.is_running:
                then:
                  - script.execute: start_mww_when_ready
      - if:
          condition:
            lambda: |-
              return id(current_mode) == 1 && id(intercom).get_state_str() == "Idle"
                     && !id(init_in_progress);
          then:
            - script.execute: update_ic_idle_labels
      # Always sync timer overlay on redraw (on_timer_tick stops when timers expire)
      - script.execute: update_timer_state

  # Timer state update + overlay UI
  - id: update_timer_state
    then:
      - lambda: |-
          const auto &timers = id(va).get_timers();
          voice_assistant::Timer first_timer{};
          voice_assistant::Timer first_active{};
          bool any_active = false;
          for (const auto &t : timers) {
            if (first_timer.total_seconds == 0 || t.seconds_left < first_timer.seconds_left) first_timer = t;
            if (t.is_active && (!any_active || t.seconds_left < first_active.seconds_left)) {
              first_active = t;
              any_active = true;
            }
          }

          // Timer overlay: show only on VA pages that support it
          int phase = id(voice_assistant_phase);
          bool on_timer_page = id(current_mode) == 0 && (
            phase == ${voice_assist_idle_phase_id} ||
            phase == ${voice_assist_listening_phase_id} ||
            phase == ${voice_assist_thinking_phase_id} ||
            phase == ${voice_assist_muted_phase_id}
          );

          // Hide if: not on a supported page, no timers, or timer finished (<=1s, not active)
          bool timer_finished = !any_active && (timers.empty() || first_timer.seconds_left <= 1);
          if (!on_timer_page || timer_finished) {
            lv_obj_add_flag(id(timer_overlay), LV_OBJ_FLAG_HIDDEN);
            return;
          }

          // Pick timer to display (active first, then paused)
          const auto &t = any_active ? first_active : first_timer;
          uint32_t sec = t.seconds_left;
          uint32_t total = t.total_seconds;

          // Bar as simple background, fixed at 100%
          lv_bar_set_value(id(timer_bar), 100, LV_ANIM_OFF);

          // Bar color: green active, grey paused
          static lv_style_t style_active, style_paused;
          static bool styles_init = false;
          if (!styles_init) {
            lv_style_init(&style_active);
            lv_style_set_bg_color(&style_active, lv_color_hex(0x26ED3A));
            lv_style_init(&style_paused);
            lv_style_set_bg_color(&style_paused, lv_color_hex(0x888888));
            styles_init = true;
          }
          lv_obj_remove_style(id(timer_bar), nullptr, LV_PART_INDICATOR);
          lv_obj_add_style(id(timer_bar), any_active ? &style_active : &style_paused, LV_PART_INDICATOR);

          // Format time text
          char buf[8];
          int h = sec / 3600;
          int m = (sec / 60) % 60;
          int s = sec % 60;
          if (h > 0) snprintf(buf, sizeof(buf), "%02d:%02d", h, m);
          else       snprintf(buf, sizeof(buf), "%02d:%02d", m, s);
          lv_label_set_text(id(timer_label), buf);

          lv_obj_clear_flag(id(timer_overlay), LV_OBJ_FLAG_HIDDEN);

  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_on: mute
          then:
            - globals.set:
                id: voice_assistant_phase
                value: '${voice_assist_muted_phase_id}'
          else:
            - if:
                condition:
                  media_player.is_playing:
                then:
                  # Music playing: show neutral mood screen instead of idle animation
                  - lambda: |-
                      lv_img_set_src(id(mood_bg), id(mood_neutral));
                  - globals.set:
                      id: voice_assistant_phase
                      value: '${voice_assist_replying_phase_id}'
                else:
                  - globals.set:
                      id: voice_assistant_phase
                      value: '${voice_assist_idle_phase_id}'

  # Swipe-driven mode switch: set the nav_anim hint, then delegate to the
  # existing switch_to_intercom / switch_to_va scripts. They funnel into
  # draw_display, which honours nav_anim (animated transition) and resets
  # it. Non-swipe callers (long-press GPIO0) leave nav_anim=0 and stay
  # instant. Single source of truth for routing + state transitions.
  - id: swipe_to_intercom
    then:
      - lambda: |-
          id(nav_anim) = LV_SCR_LOAD_ANIM_MOVE_TOP;
          id(nav_anim_ms) = 300;
      - script.execute: switch_to_intercom

  - id: swipe_to_va
    then:
      - lambda: |-
          id(nav_anim) = LV_SCR_LOAD_ANIM_MOVE_BOTTOM;
          id(nav_anim_ms) = 300;
      - script.execute: switch_to_va

  # Mode switching scripts
  - id: switch_to_va
    then:
      - globals.set:
          id: current_mode
          value: '0'
      - script.execute: set_idle_or_mute_phase
      - if:
          condition:
            lambda: |-
              return id(voice_assistant_phase) == ${voice_assist_replying_phase_id};
          then:
            - script.execute: update_replying_text
            - if:
                condition:
                  lambda: |-
                    return id(reply_total_pages) > 1;
                then:
                  - script.execute: reply_pagination_timer
      - script.execute: draw_display

  - id: switch_to_intercom
    then:
      - script.stop: reply_pagination_timer
      - globals.set:
          id: current_mode
          value: '1'
      - script.execute: update_ic_idle_labels
      - script.execute: draw_display

  # Update all dynamic labels on the intercom idle page
  - id: update_ic_idle_labels
    then:
      - lambda: id(peer_name) = id(intercom).get_current_destination();
      - lvgl.label.update:
          id: ic_idle_peer_label
          text: !lambda 'return id(peer_name);'
      - lvgl.label.update:
          id: ic_idle_contacts_label
          text: !lambda |-
            auto csv = id(intercom).get_contacts_csv();
            int count = csv.empty() ? 0 : std::count(csv.begin(), csv.end(), ',') + 1;
            char buf[16];
            snprintf(buf, sizeof(buf), "\U000F06CB %d", count);
            return std::string(buf);

  # Update clock and battery labels on idle page
  - id: update_idle_labels
    then:
      - lvgl.label.update:
          id: top_clock_label
          text:
            format: "%02d:%02d"
            args: ['id(my_time).now().hour', 'id(my_time).now().minute']
      - if:
          condition:
            - lambda: return id(battery_percentage).has_state() && !std::isnan(id(battery_percentage).state);
          then:
            - lvgl.label.update:
                id: top_battery_label
                text: !lambda |-
                  bool charging = id(usb_connected).state;
                  float bat = id(battery_percentage).state;
                  float wifi = id(wifi_pct).state;
                  std::string ret;
                  if (bat < 10) ret = charging ? "\U000F089F" : "\U000F008E";
                  else if (bat < 20) ret = charging ? "\U000F089C" : "\U000F007A";
                  else if (bat < 30) ret = charging ? "\U000F0086" : "\U000F007B";
                  else if (bat < 40) ret = charging ? "\U000F0087" : "\U000F007C";
                  else if (bat < 50) ret = charging ? "\U000F0088" : "\U000F007D";
                  else if (bat < 60) ret = charging ? "\U000F089D" : "\U000F007E";
                  else if (bat < 70) ret = charging ? "\U000F0089" : "\U000F007F";
                  else if (bat < 80) ret = charging ? "\U000F089E" : "\U000F0080";
                  else if (bat < 90) ret = charging ? "\U000F008A" : "\U000F0081";
                  else if (bat < 100) ret = charging ? "\U000F008B" : "\U000F0082";
                  else ret = "\U000F0079";
                  if (wifi < 20) ret += "\U000F08BF";
                  else if (wifi < 55) ret += "\U000F08BC";
                  else if (wifi < 80) ret += "\U000F08BD";
                  else ret += "\U000F08BE";
                  ret += api::global_api_server->is_connected() ? "\U000F07D0" : "\U000F15D0";
                  return ret;
          else:
            - lvgl.label.update:
                id: top_battery_label
                text: ""

  # Update replying page labels with current page of wrapped text
  - id: update_replying_text
    then:
      - lambda: |-
          if (id(current_mode) != 0 ||
              id(voice_assistant_phase) != ${voice_assist_replying_phase_id}) {
            return;
          }
          static std::vector<std::string> visible_lines(10);
          static std::string page_counter_text;
          lv_obj_t* lines[] = {
            id(reply_line_0), id(reply_line_1), id(reply_line_2), id(reply_line_3), id(reply_line_4),
            id(reply_line_5), id(reply_line_6), id(reply_line_7), id(reply_line_8), id(reply_line_9)
          };
          const size_t total_rows = 10;
          const auto &wrapped = id(wrapped_lines_reply);
          const size_t total_pages = std::max(1, id(reply_total_pages));
          const size_t cur_page = id(reply_page_index) % total_pages;
          const size_t start_line = cur_page * total_rows;
          for (size_t i = 0; i < total_rows; i++) {
            size_t line_idx = start_line + i;
            visible_lines[i] = line_idx < wrapped.size() ? wrapped[line_idx] : "";
            lv_label_set_text_static(lines[i], visible_lines[i].c_str());
          }
          // Update page counter
          if (total_pages > 1) {
            page_counter_text = str_sprintf("%d/%d", (int) (cur_page + 1), (int) total_pages);
            lv_label_set_text_static(id(reply_page_counter), page_counter_text.c_str());
          } else {
            page_counter_text.clear();
            lv_label_set_text_static(id(reply_page_counter), page_counter_text.c_str());
          }

  # Auto-advance replying text pages every 14 seconds
  - id: reply_pagination_timer
    mode: restart
    then:
      - delay: 14s
      - if:
          condition:
            lambda: |-
              return id(current_mode) == 0 &&
                     id(voice_assistant_phase) == ${voice_assist_replying_phase_id} &&
                     id(reply_total_pages) > 1;
          then:
            - globals.set:
                id: reply_page_index
                value: !lambda 'return id(reply_page_index) + 1;'
            - script.execute: update_replying_text
            - script.execute: reply_pagination_timer

  # Timer alarm: play sound in a loop until timer_ringing is turned off
  - id: timer_alarm_loop
    mode: single
    then:
      - while:
          condition:
            switch.is_on: timer_ringing
          then:
            - media_player.speaker.play_on_device_media_file:
                media_file: timer_finished_sound
                announcement: true
            - delay: 6s

  # Backlight timer
  - id: backlight_timer
    mode: restart
    then:
      - light.turn_on:
          id: backlight
          brightness: 100%
      - delay: 30s
      - light.turn_on:
          id: backlight
          brightness: 60%
      - delay: 120s
      - if:
          condition:
            binary_sensor.is_on: usb_connected
          then:
            - light.turn_on:
                id: backlight
                brightness: 20%
          else:
            - light.turn_off: backlight

# =============================================================================
# BUTTONS
# =============================================================================
button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true

# =============================================================================
# SENSORS
# =============================================================================
sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    attenuation: 12db
    accuracy_decimals: 2
    update_interval: 10s
    unit_of_measurement: "V"
    icon: mdi:battery
    filters:
      - multiply: 2.0
      - median:
          window_size: 7
          send_every: 7
          send_first_at: 1
      - throttle: 1min

  - platform: template
    id: battery_percentage
    name: "Battery Percentage"
    lambda: |-
      if (!id(battery_voltage).has_state() || std::isnan(id(battery_voltage).state))
        return NAN;
      return id(battery_voltage).state;
    accuracy_decimals: 0
    unit_of_measurement: "%"
    icon: mdi:battery-medium
    filters:
      - calibrate_linear:
         method: exact
         datapoints:
          - 2.80 -> 0.0
          - 3.10 -> 10.0
          - 3.30 -> 20.0
          - 3.45 -> 30.0
          - 3.60 -> 40.0
          - 3.70 -> 50.0
          - 3.75 -> 60.0
          - 3.80 -> 70.0
          - 3.90 -> 80.0
          - 4.00 -> 90.0
          - 4.20 -> 100.0
      - lambda: |-
          if (x > 100) return 100;
          if (x < 0) return 0;
          return x;

# =============================================================================
# BINARY SENSORS
# =============================================================================
binary_sensor:
  # True when the VA idle page is the active screen
  - platform: template
    id: is_idle_screen
    lambda: |-
      return id(current_mode) == 0 &&
             id(voice_assistant_phase) == ${voice_assist_idle_phase_id} &&
             !id(init_in_progress);
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: is_idle_screen
            then:
              - script.execute: ai_animation_loop
            else:
              - script.stop: ai_animation_loop
              - lambda: |-
                  lv_anim_del(id(idle_anim), nullptr);
                  lv_animimg_start(id(idle_anim));
                  lv_anim_del(id(idle_anim), nullptr);

  # Physical GPIO0 button - PAGE AWARE (uses mode/state checks instead of display.is_displaying_page)
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    id: main_button
    name: "Main Button"
    icon: "mdi:gesture-tap-button"
    on_multi_click:
      # Single click
      - timing:
          - ON for 10ms to 500ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                - if:
                    condition:
                      lambda: return id(current_mode) == 1 && id(intercom).get_state_str() == "Idle";
                    then:
                      - intercom_api.call_toggle: intercom
                    else:
                      - if:
                          condition:
                            lambda: |-
                              if (id(current_mode) != 1) return false;
                              auto s = id(intercom).get_state_str();
                              return s != "Idle";
                          then:
                            - intercom_api.call_toggle: intercom
                          else:
                            - if:
                                condition:
                                  not:
                                    voice_assistant.is_running:
                                then:
                                  - voice_assistant.start:
                                else:
                                  - voice_assistant.stop:
      # Double click: decline incoming or next contact
      - timing:
          - ON for 50ms to 500ms
          - OFF for 50ms to 400ms
          - ON for 50ms to 500ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                lambda: |-
                  if (id(current_mode) != 1) return false;
                  auto s = id(intercom).get_state_str();
                  return s == "Ringing" || s == "Incoming";
              then:
                - intercom_api.decline_call: intercom
              else:
                - if:
                    condition:
                      lambda: return id(current_mode) == 1 && id(intercom).get_state_str() == "Idle";
                    then:
                      - intercom_api.next_contact: intercom
      # Long press (3s): switch VA <-> Intercom
      - timing:
          - ON for 1s to 3s
        then:
          - if:
              condition:
                lambda: return id(current_mode) == 1 && id(intercom).get_state_str() == "Idle";
              then:
                - script.execute: switch_to_va
              else:
                - script.execute: switch_to_intercom

  - platform: template
    name: "USB Connected"
    id: usb_connected
    device_class: plug
    lambda: return id(battery_voltage).state > 3.9;
    on_press:
      - script.execute: backlight_timer
    on_release:
      - script.execute: backlight_timer


# =============================================================================
# OUTPUTS AND LIGHTS
# =============================================================================
output:
  - platform: gpio
    id: speaker_enable
    pin: GPIO46
  - platform: ledc
    id: backlight_output
    pin: GPIO42
    inverted: true

light:
  - platform: monochromatic
    id: backlight
    name: "Display Backlight"
    icon: "mdi:brightness-6"
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

# =============================================================================
# SWITCHES AND SELECTS
# =============================================================================
switch:
  - platform: template
    name: "Stealth Listen"
    id: stealth_listen_switch
    icon: "mdi:ear-hearing"
    optimistic: true
    restore_mode: ALWAYS_OFF
    entity_category: config
    on_turn_on:
      - script.execute: stealth_listen_start
    on_turn_off:
      - script.execute: stealth_listen_stop

  # Replace package mic mute; speaker mute is device-specific.
  - id: !remove mute

  # Mic Mute: uses mic_afe + display updates
  - platform: template
    name: Mic Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute ON: microphone silenced, MWW stopped"
      - voice_assistant.stop:
      - micro_wake_word.stop:
      - microphone.mute: mic_afe
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_muted_phase_id}'
      - script.execute: draw_display
      - script.execute: update_status
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute OFF: microphone active, MWW started"
      - microphone.unmute: mic_afe
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_idle_phase_id}'
      - if:
          condition:
            not:
              micro_wake_word.is_running:
          then:
            - script.execute: start_mww_when_ready
      - script.execute: draw_display
      - script.execute: update_status

  # Speaker Mute (device override): adds amp enable/disable
  - platform: template
    name: Speaker Mute
    id: speaker_mute
    icon: mdi:volume-off
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute ON: DAC muted, amplifier off"
      - speaker.mute_on: hw_speaker
      - delay: 50ms
      - output.turn_off: speaker_enable
      - script.execute: update_status
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute OFF: amplifier on, DAC unmuted"
      - if:
          condition:
            speaker.is_playing: hw_speaker
          then:
            - output.turn_on: speaker_enable
            - delay: 50ms
      - speaker.mute_off: hw_speaker
      - script.execute: update_status

  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - script.stop: timer_alarm_loop
      - media_player.stop:
          announcement: true
      - script.execute: update_status
    on_turn_on:
      - media_player.stop:
          announcement: true
      - script.execute: timer_alarm_loop
      - script.execute: update_status
      - delay: 15min
      - switch.turn_off: timer_ringing

  # Intercom switches

  # AEC runtime toggles
# =============================================================================
# Select Entities
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    options:
      - "sr_low_cost"
      - "sr_high_perf"
      - "fd_low_cost"
      - "fd_high_perf"
    initial_option: "fd_low_cost"
    # Non-optimistic: see waveshare-s3-full-afe-tcp.yaml for rationale.
    optimistic: false
    restore_value: false
    set_action:
      - if:
          condition:
            lambda: 'return id(init_in_progress);'
          then:
            - logger.log: "AEC mode select: skipping during boot"
          else:
            - if:
                condition:
                  or:
                    - voice_assistant.is_running:
                    - not:
                        intercom_api.is_idle: intercom
                then:
                  - logger.log:
                      level: WARN
                      format: "Cannot switch AEC mode during active VA/intercom"
                else:
                  - logger.log:
                      format: "Switching AEC mode to %s"
                      args: ['x.c_str()']
                  - micro_wake_word.stop:
                  - esp_audio_stack.stop_and_wait: audio_stack
                  - esp_afe.set_mode:
                      id: afe_processor
                      mode: !lambda 'return x;'
                  - esp_audio_stack.start: audio_stack
                  - delay: 300ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - script.execute: start_mww_when_ready
      - lambda: |-
          id(aec_mode_select).publish_state(id(afe_processor).get_mode_name());

# =============================================================================
# TEXT SENSORS
# =============================================================================
text_sensor:
  - id: text_request
    platform: template
    on_value:
      then:
        - lambda: |-
            const std::string &text = x;
            lv_obj_t* lines[] = {
              id(think_line_0), id(think_line_1), id(think_line_2), id(think_line_3), id(think_line_4),
              id(think_line_5), id(think_line_6), id(think_line_7), id(think_line_8), id(think_line_9)
            };
            for (size_t i = 0; i < 10; i++) lv_label_set_text(lines[i], "");
            if (text == "...") return;
            std::vector<std::string> words;
            words.reserve(text.size()/5);
            size_t start = 0;
            for (size_t i = 0; i <= text.size(); ++i) {
              if (i == text.size() || text[i] == ' ' || text[i] == '\n' || text[i] == '\r' || text[i] == '\t') {
                if (i > start) words.push_back(text.substr(start, i - start));
                start = i + 1;
              }
            }
            if (words.empty() || id(chord_widths_cache).empty()) return;
            const auto &chords = id(chord_widths_cache);
            const size_t total_rows = chords.size();
            const lv_font_t *font = lv_obj_get_style_text_font(id(think_line_0), LV_PART_MAIN);
            // Start from middle of display (row total_rows/2 - 3)
            size_t start_row = total_rows / 2 - 3;
            if (start_row >= total_rows) start_row = 0;
            // lines[] already cleared above
            size_t row = start_row;
            size_t word_idx = 0;
            const int avg_char_w = lv_font_get_line_height(font) * 2 / 3;  // ~60% of line height
            while (row < total_rows && row < 10 && word_idx < words.size()) {
              const int chord_w = chords[row];
              if (chord_w <= 0) { row++; continue; }
              const size_t sw = word_idx;
              std::string line;
              line.reserve(chord_w / avg_char_w);
              while (word_idx < words.size()) {
                const auto &word = words[word_idx];
                std::string candidate = line.empty() ? word : (line + ' ' + word);
                if ((int)(candidate.length() * avg_char_w) > chord_w) {
                  lv_point_t size;
                  lv_text_get_size(&size, candidate.c_str(), font, 0, 0, INT32_MAX, LV_TEXT_FLAG_NONE);
                  if (size.x > chord_w) {
                    if (word_idx == sw) { line = word; word_idx++; }
                    break;
                  }
                }
                line = candidate;
                word_idx++;
              }
              if (word_idx > sw) lv_label_set_text(lines[row], line.c_str());
              row++;
            }

  - id: text_response
    platform: template
    on_value:
      then:
        - lambda: |-
            // Skip redundant "..." during replying phase (label text set by update_replying_text)
            if (x == "..." && id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
              return;
            }
            const std::string &text = x;
            std::vector<std::string> words;
            words.reserve(text.size()/5);
            size_t start = 0;
            for (size_t i = 0; i <= text.size(); ++i) {
              if (i == text.size() || text[i] == ' ' || text[i] == '\n' || text[i] == '\r' || text[i] == '\t') {
                if (i > start) {
                  words.push_back(text.substr(start, i - start));
                }
                start = i + 1;
              }
            }
            id(reply_page_index) = 0;
            id(wrapped_lines_reply).clear();
            id(reply_total_pages) = 1;
            if (words.empty() || id(chord_widths_cache).empty()) return;
            const auto &chords = id(chord_widths_cache);
            const size_t total_rows = chords.size();
            const lv_font_t *font = lv_obj_get_style_text_font(id(reply_line_0), LV_PART_MAIN);
            const int avg_char_w = lv_font_get_line_height(font) * 2 / 3;
            size_t word_idx = 0;
            size_t safety = 0;
            size_t line_count = 0;
            while (word_idx < words.size() && safety++ < words.size() * 2) {
              int row = line_count % total_rows;
              const int chord_w = chords[row];
              if (chord_w <= 0) { id(wrapped_lines_reply).push_back(""); line_count++; continue; }
              const size_t start_word = word_idx;
              std::string line;
              line.reserve(chord_w / avg_char_w);
              while (word_idx < words.size()) {
                const auto &word = words[word_idx];
                std::string candidate = line.empty() ? word : (line + ' ' + word);
                if ((int)(candidate.length() * avg_char_w) > chord_w) {
                  lv_point_t size;
                  lv_text_get_size(&size, candidate.c_str(), font, 0, 0, INT32_MAX, LV_TEXT_FLAG_NONE);
                  if (size.x > chord_w) {
                    if (word_idx == start_word) { line = word; word_idx++; }
                    break;
                  }
                }
                line = candidate;
                word_idx++;
              }
              if (word_idx > start_word) {
                id(wrapped_lines_reply).push_back(line);
                line_count++;
              }
            }
            while (!id(wrapped_lines_reply).empty() && (id(wrapped_lines_reply).size() % 10) != 0) {
              id(wrapped_lines_reply).push_back("");
            }
            line_count = id(wrapped_lines_reply).size();
            id(reply_total_pages) = (line_count + 10 - 1) / 10;
            if (id(reply_total_pages) < 1) id(reply_total_pages) = 1;

