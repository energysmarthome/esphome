            align: CENTER
            src: error_no_wifi

    # ========================================================================
    # INTERCOM: IDLE PAGE
    # ========================================================================
    - id: ic_idle_page
      bg_color: 0x0000FF
      # Horizontal swipe = prev/next contact. Vertical navigation is supplied by
      # the including firmware variant: full-experience goes VA <-> intercom <->
      # settings, intercom-only keeps the intercom/settings stack.
      on_swipe_left:
        - intercom_api.next_contact: intercom
        - script.execute: update_ic_idle_labels
      on_swipe_right:
        - intercom_api.prev_contact: intercom
        - script.execute: update_ic_idle_labels
      on_swipe_up:
        - script.execute: ic_intercom_to_settings
      on_swipe_down:
        - script.execute: ic_intercom_to_va
      widgets:
        - label:
            align: TOP_MID
            y: 8%
            text: "${friendly_name}"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            width: ${ic_title_width}
            long_mode: SCROLL
        # State (static) + contacts row (dynamic) on two lines, centered.
        - label:
            id: ic_idle_status_label
            align: TOP_MID
            y: 17%
            text: "IDLE"
            text_color: 0x00FF00
            text_font: font_state
            text_align: CENTER
        - label:
            id: ic_idle_contacts_label
            align: TOP_MID
            y: ${ic_contacts_y}
            text: "\U000F06CB 0"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
        # Peer name: single line; long names ping-pong scroll horizontally.
        - label:
            id: ic_idle_peer_label
            align: CENTER
            text: "-"
            text_color: 0xFFFFFF
            text_font: font_title
            width: ${ic_peer_width}
            text_align: CENTER
            long_mode: SCROLL
        # Prev/next contact buttons: explicit chevron taps next to the peer
        # name. Page on_swipe_left/right keeps the gesture path alive too.
        - button:
            id: ic_idle_prev_contact_btn
            align: CENTER
            x: -60
            y: -34
            width: 60
            height: 60
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F0731"
                  align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ic_icons
            on_short_click:
              - intercom_api.prev_contact: intercom
              - script.execute: update_ic_idle_labels
        - button:
            id: ic_idle_next_contact_btn
            align: CENTER
            x: 60
            y: -34
            width: 60
            height: 60
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F0734"
                  align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ic_icons
            on_short_click:
              - intercom_api.next_contact: intercom
              - script.execute: update_ic_idle_labels
        # Green call button below the peer name (idle screen only calls).
        - button:
            floating: true
            align: CENTER
            y: ${ic_btn_below_center}
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F2"
                  align: CENTER
                  text_color: 0x00FF00
                  text_font: ic_icons
            on_short_click:
              - intercom_api.call_toggle: intercom

      # ========================================================================
      # INTERCOM: RINGING IN PAGE
      # ========================================================================
    - id: ic_ringing_in_page
      bg_color: 0xFF0000
      widgets:
        - label:
            align: TOP_MID
            y: 8%
            text: "${friendly_name}"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            width: ${ic_title_width}
            long_mode: SCROLL
        - label:
            align: TOP_MID
            y: 17%
            text: "RINGING"
            text_color: 0xFFFF00
            text_font: font_state
            text_align: CENTER
        - label:
            id: ic_ringing_in_peer_label
            align: CENTER
            text: ""
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            long_mode: SCROLL
            width: ${ic_ringing_in_peer_width}
        # Answer (green left) / Decline (red right)
        - button:
            floating: true
            align: LEFT_MID
            x: ${ic_btn_offset}
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F2"
                  align: CENTER
                  text_color: 0x00FF00
                  text_font: ic_icons
            on_short_click:
              - intercom_api.call_toggle: intercom
        - button:
            floating: true
            align: RIGHT_MID
            x: -5
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F5"
                  align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ic_icons
            on_short_click:
              - intercom_api.decline_call: intercom

      # ========================================================================
      # INTERCOM: RINGING OUT PAGE
      # ========================================================================
    - id: ic_ringing_out_page
      bg_color: 0xFF9900
      widgets:
        - label:
            align: TOP_MID
            y: 8%
            text: "${friendly_name}"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            width: ${ic_title_width}
            long_mode: SCROLL
        - label:
            align: TOP_MID
            y: 17%
            text: "CALLING"
            text_color: 0x000000
            text_font: font_state
            text_align: CENTER
        - label:
            id: ic_ringing_out_peer_label
            align: CENTER
            text: ""
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            long_mode: SCROLL
            width: ${ic_peer_width}
        # Hangup below center
        - button:
            floating: true
            align: CENTER
            y: ${ic_btn_below_center}
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F5"
                  align: CENTER
                  text_color: 0xFF0000
                  text_font: ic_icons
            on_short_click:
              - intercom_api.decline_call: intercom

      # ========================================================================
      # INTERCOM: IN CALL PAGE
      # ========================================================================
    - id: ic_in_call_page
      bg_color: 0x008800
      widgets:
        - label:
            align: TOP_MID
            y: 8%
            text: "${friendly_name}"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            width: ${ic_title_width}
            long_mode: SCROLL
        - label:
            align: TOP_MID
            y: 17%
            text: "IN CALL"
            text_color: 0x0000FF
            text_font: font_state
            text_align: CENTER
        - label:
            id: ic_in_call_peer_label
            align: CENTER
            text: ""
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            long_mode: SCROLL
            width: ${ic_peer_width}
        # Hangup below center
        - button:
            floating: true
            align: CENTER
            y: ${ic_btn_below_center}
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F5"
                  align: CENTER
                  text_color: 0xFF0000
                  text_font: ic_icons
            on_short_click:
              - intercom_api.call_toggle: intercom

      # ========================================================================
      # INTERCOM: CALL ENDED PAGE
      # ========================================================================
      # Shown for ~4 s after a call terminates. ui_ic_ended writes the peer
      # + reason labels and toggles ic_ended_active so draw_display keeps
      # this page on screen until the auto-return delay elapses.
    - id: ic_ended_page
      bg_color: 0x202020
      # Tap anywhere on the page = skip the 4 s auto-return countdown.
      on_click:
        - lambda: 'id(ic_ended_active) = false;'
        - script.execute: draw_display
      widgets:
        - label:
            align: TOP_MID
            y: 8%
            text: "${friendly_name}"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            width: ${ic_title_width}
            long_mode: SCROLL
        - label:
            align: CENTER
            y: -22%
            text: "Call ended"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            width: ${ic_ended_text_width}
        - label:
            id: ic_ended_peer_label
            align: CENTER
            text: ""
            text_color: 0xFFFFFF
            # font_title carries the full GF_Latin_Core glyph set so
            # the free-form peer name renders correctly.
            text_font: font_title
            text_align: CENTER
            long_mode: SCROLL
            width: ${ic_peer_width}
        - label:
            align: CENTER
            y: 13%
            text: "Reason:"
            text_color: 0xFFFFFF
            text_font: font_info
            text_align: CENTER
            width: ${ic_ended_text_width}
        - label:
            id: ic_ended_reason_label
            align: CENTER
            y: 25%
            text: "-"
            text_color: 0xFFCC66
            text_font: font_info
            text_align: CENTER
            long_mode: SCROLL
            width: ${ic_ended_reason_text_width}
    # ========================================================================
    # SETTINGS PAGE (one vertical scroll surface for round displays)
    # ========================================================================
    # Spotpear round-display settings surface for full AEC builds.
    # The page is one vertical scroll view: swipe down exits to Intercom only when
    # the scroll position is already at the top. Widget IDs intentionally match the
    # generic settings sync packages.
    - id: settings_continuous_page
      bg_color: 0x202020
      scrollable: true
      scroll_elastic: true
      scroll_dir: VER
      scrollbar_mode: AUTO
      on_scroll:
        - lambda: |-
            if (!id(ic_settings_active)) return;
            if (lv_obj_get_scroll_y(id(settings_continuous_page)->obj) < -28) {
              id(ic_settings_close).execute();
            }
      widgets:
        - label:
            text: "Audio"
            align: TOP_MID
            y: 18
            width: ${ic_settings_mid_width}
            text_align: CENTER
            text_font: montserrat_16
            text_color: 0xFFFFFF
        - label:
            text: "Master volume"
            align: TOP_MID
            y: 48
            width: ${ic_settings_mid_width}
            text_align: CENTER
            text_font: montserrat_14
            text_color: 0xB0B0B0
        - slider:
            id: ui_speaker_vol_slider
            align: TOP_MID
            y: 74
            width: ${ic_settings_row_width}
            height: 14
            min_value: 0
            max_value: 100
            value: !lambda 'return id(master_volume).state;'
            adv_hittest: true
            gesture_bubble: true
            on_release:
              - number.set:
                  id: master_volume
                  value: !lambda 'return x;'
        - label:
            text: "Microphone gain"
            align: TOP_MID
            y: 106
            width: ${ic_settings_mid_width}
            text_align: CENTER
            text_font: montserrat_14
            text_color: 0xB0B0B0
        - slider:
            id: ui_mic_vol_slider
            align: TOP_MID
            y: 132
            width: ${ic_settings_row_width}
            height: 14
            min_value: -20
            max_value: 30
            value: !lambda 'return id(mic_gain).state;'
            adv_hittest: true
            gesture_bubble: true
            on_release:
              - number.set:
                  id: mic_gain
                  value: !lambda 'return x;'
        - label:
            text: "Call"
            align: TOP_MID
            y: 178
            width: ${ic_settings_mid_width}
            text_align: CENTER
            text_font: montserrat_16
            text_color: 0xFFFFFF
        - obj:
            align: TOP_MID
            y: 210
            width: ${ic_settings_mid_width}
            height: 38
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  text: "Speaker mute"
                  align: LEFT_MID
                  x: 0
                  width: 120
                  text_font: montserrat_14
                  text_color: 0xB0B0B0
              - switch:
                  id: ui_speaker_mute_sw
                  align: RIGHT_MID
                  width: 44
                  height: 24
                  state:
                    checked: !lambda 'return id(speaker_mute).state;'
                  on_value:
                    - lambda: |-
                        if (x == id(speaker_mute).state) return;
                        if (x) id(speaker_mute).turn_on();
                        else id(speaker_mute).turn_off();
        - obj:
