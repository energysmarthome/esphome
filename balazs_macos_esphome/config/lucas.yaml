esphome:
  name: lucas
  friendly_name: lucas

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "EJPQ+7u2zjH1E/Nyrf3nOUFxZVYeubPLedh6QSs80OA="

ota:
  - platform: esphome
    password: "867c2df61002c1ff3f0ece420518a9e7"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.251
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Lucas Fallback Hotspot"
    password: "RCL6d4qpDv2y"

captive_portal:

web_server:
  port: 80
    
esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true


ads1115:
  - address: 0x48
    id: ads1115_a
    continuous_mode: true

sensor:
  - platform: dht
    pin: GPIO18
    temperature:
      name: "Lucas hőmérséklet"
    humidity:
      name: "Lucas páratartalom"
    update_interval: 30s
  - platform: ads1115
    ads1115_id: ads1115_a
    multiplexer: 'A0_GND'
    update_interval: 5s
    name: "5V feszültség számításhoz"
    gain: 4.096
    filters:
      - calibrate_linear:
         method: exact
         datapoints:
          #  - -0.002 -> 0
          #  - 0.256 -> 1.301
          #  - 0.349 -> 1.766
          #  - 0.455 -> 2.229
          #  - 0.564 -> 2.84
          #  - 0.640 -> 3.22
          #  - 0.754 -> 3.8
          #  - 0.953 -> 4.8
           - -0.002 -> -0.1
           - 0.256 -> 1.201
           - 0.349 -> 1.666
           - 0.455 -> 2.129
           - 0.564 -> 2.74
           - 0.640 -> 3.12
           - 0.754 -> 3.7
           - 0.953 -> 4.7



  - platform: ads1115
    ads1115_id: ads1115_a
    multiplexer: 'A1_GND'
    update_interval: 5s
    name: "12V feszültség számításhoz"
    gain: 4.096
    filters:
      - calibrate_linear:
         method: exact
         datapoints:
           - -0.002 -> 0
           - 0.256 -> 1.298
           - 0.351 -> 1.776
           - 0.450 -> 2.27
           - 0.560 -> 2.82
           - 0.650 -> 3.27
           - 0.745 -> 3.75
           - 2.345 -> 11.79





switch:
  - platform: restart
    name: "lucas Restart"