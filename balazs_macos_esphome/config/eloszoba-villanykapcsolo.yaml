esphome:
  name: eloszoba-villanykapcsolo
  friendly_name: eloszoba_villanykapcsolo

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ae96Hf3rE6HvnJsimfSspyykRbqKODaakh0SCBapEN8="

ota:
  - platform: esphome
    password: "8465609079f1525bf7d0164aeb9cc3ea"
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.216
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Eloszoba-Lampakapcsolo"
    password: "0f4c873EwxHU"

captive_portal:



web_server:
  port: 80

# Definiáljuk a reléket
switch:

  - platform: restart
    name: "eloszobalampakapcsolo Restart"


# Definiáljuk a beépített LED-et, ha van
light:
  - platform: binary
    name: "Előszoba Beépített LED"
    output: led_output
  - platform: binary
    name: "Előszoba lámpakapcsoló"
    output: led_output1
    id: relay1

output:
  - platform: gpio
    pin: GPIO13
    inverted: true
    id: led_output
  - platform: gpio
    pin: GPIO12
    inverted: false
    id: led_output1
# Definiáljuk a gombokat
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Előszoba lámpakapcsoló"
    on_press:
      - light.toggle: relay1


