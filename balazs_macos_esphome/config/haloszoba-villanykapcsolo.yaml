esphome:
  name: haloszoba-villanykapcsolo
  friendly_name: haloszoba_villanykapcsolo

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "j3GN+zPzQMOcf8cmK3p8yyt/eewVU2thgvUu0oTTVl8="

ota:
  - platform: esphome
    password: "666e0aecc94ee56ba4ee370cc318af52"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.217
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "haloszoba-Lampakapcsolo"
    password: "0f4c873EwxHU"

captive_portal:


web_server:
  port: 80

# Definiáljuk a reléket
switch:

  - platform: restart
    name: "haloszobalampakapcsolo Restart"


# Definiáljuk a beépített LED-et, ha van
light:
  - platform: binary
    name: "Hálószoba Beépített LED"
    output: led_output
  - platform: binary
    name: "Hálószoba lámpa"
    output: led_output1
    id: relay1

output:
  - platform: gpio
    pin: GPIO13
    inverted: true
    id: led_output
  - platform: gpio
    pin: GPIO12
    inverted: false
    id: led_output1

# Definiáljuk a gombokat
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Hálószoba lámpakapcsoló"
    on_press:
      - light.toggle: relay1


