esphome:
  name: nappali-villanykapcsolo
  friendly_name: nappali_villanykapcsolo

  on_boot:
    priority: -100
    then:
      - delay: 5s
      - script.execute: sync_spot_dummy_to_ha_light

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "Qbq7/OMvWy1hqnjEgL8TZ02os2tV7MXdswoCHtnUF8A="

ota:
  - platform: esphome
    password: "e9050c018f140cd59c7089a245988d89"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.221
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Nappali-Villanykapcsolo"
    password: "9TL5bKECjS7a"

captive_portal:
    
web_server:
  port: 80

# Definiáljuk a reléket
switch:
  - platform: restart
    name: "nappalivillanykapcsolo Restart"

# Definiáljuk a beépített LED-et, ha van
light:
  - platform: binary
    name: "Beépített LED"
    output: led_output

  - platform: binary
    name: "Nappali hátsó"
    output: led_output1
    id: relay1

  - platform: binary
    name: "Nappali ebédlőasztal"
    output: led_output2
    id: relay2

  - platform: binary
    name: "spot dummy"
    output: led_output3
    id: relay3
    restore_mode: ALWAYS_OFF

output:
  - platform: gpio
    pin: GPIO13
    inverted: True
    id: led_output

  - platform: gpio
    pin: GPIO12
    inverted: false
    id: led_output1

  - platform: gpio
    pin: GPIO05
    inverted: false
    id: led_output2

  - platform: gpio
    pin: GPIO04
    inverted: false
    id: led_output3

# Definiáljuk a gombokat
binary_sensor:
  # Home Assistant lámpa állapota.
  # Ez lesz az igazság forrása a spot dummy háttérfényéhez.
  - platform: homeassistant
    id: konyha_spot_lampak_allapot
    entity_id: light.konyha_spot_lampak
    internal: true
    on_state:
      then:
        - script.execute: sync_spot_dummy_to_ha_light

  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Gomb 1"
    on_press:
      - light.toggle: relay1

  - platform: gpio
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: True
    name: "Gomb 2"
    on_press:
      - light.toggle: relay2

  - platform: gpio
    pin:
      number: GPIO10
      mode: INPUT_PULLUP
      inverted: True
    name: "Gomb 3"
    on_press:
      - homeassistant.action:
          action: light.toggle
          data:
            entity_id: light.konyha_spot_lampak

script:
  - id: sync_spot_dummy_to_ha_light
    mode: restart
    then:
      - if:
          condition:
            binary_sensor.is_on: konyha_spot_lampak_allapot
          then:
            - light.turn_on: relay3
          else:
            - light.turn_off: relay3

remote_receiver:
  - id: rc_receiver
    pin: 3
    dump: rc_switch
    tolerance: 50%
    filter: 100us
    idle: 2ms
    buffer_size: 2kb
    on_rc_switch:
      then:
        - lambda: |-
            id(received_rf_code).publish_state(to_string(x.code));

text_sensor:
  - platform: homeassistant
    name: "RF Code"
    entity_id: input_text.rf_code
    id: rf_code

  - platform: template
    name: "Received RF Code"
    id: received_rf_code