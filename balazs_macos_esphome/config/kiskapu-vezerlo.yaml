  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "237MbSb5ITeJwjzWKJB7hZA8Gyjbp7TdqW6pyazg0w8="

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid_udvar
