esphome:
  name: homokszuro-dugalj
  friendly_name: "Homokszűrő dugalj"

esp8266:
  board: esp01_1m
  restore_from_flash: true

preferences:
  flash_write_interval: 5min

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "aMS7vRTGBr9L7YBIjYtymDlnKSC28ZZqDfF61nx/nAU="

ota:
  - platform: esphome
    password: "93a30f332aa6ba95440878a448b163a5"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.246
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Homokszuro Fallback Hotspot"
    password: "Wm3ssvFvRfen"

captive_portal:

web_server:
  port: 80

time:
  - platform: homeassistant
    id: homeassistant_time

substitutions:
  device_name: "Homokszűrő dugalj"
  # Higher value gives lower watt readout
  current_res: "0.0023999695777779167"
  # Lower value gives lower voltage readout
  voltage_div: "737.0726467642497"
  # Max Power is 3450W for 15A and 2300W for 10A
  max_power: "3450"
  # 2020 model uses GPIO4 for CF1
  current_multiply: "1.8497536246211523"
  cf1_pin: GPIO04

number:
  - platform: template
    name: "${device_name} feszültség kalibráció"
    id: voltage_cal
    optimistic: true
    restore_value: true
    initial_value: 1.000
    min_value: 0.500
    max_value: 1.500
    step: 0.001
    mode: box
    icon: mdi:tune
    on_value:
      then:
        - component.update: voltage_calibrated

  - platform: template
    name: "${device_name} áram kalibráció"
    id: current_cal
    optimistic: true
    restore_value: true
    initial_value: 1.000
    min_value: 0.500
    max_value: 1.500
    step: 0.001
    mode: box
    icon: mdi:tune
    on_value:
      then:
        - component.update: current_calibrated

  - platform: template
    name: "${device_name} teljesítmény kalibráció"
    id: power_cal
    optimistic: true
    restore_value: true
    initial_value: 1.000
    min_value: 0.500
    max_value: 1.500
    step: 0.001
    mode: box
    icon: mdi:tune
    on_value:
      then:
        - component.update: power

# Button configuration
binary_sensor:
  - platform: gpio
    name: "${device_name} gomb"
    id: button
    pin:
      number: GPIO13
      inverted: true
    on_press:
      then:
        - switch.toggle: relay

# Setup of LED's used in displaying Switch status
output:
  - platform: gpio
    pin: GPIO0
    inverted: true
    id: led

# Config for switch
switch:
  - platform: gpio
    pin: GPIO15
    restore_mode: RESTORE_DEFAULT_ON
    id: relay
    name: "${device_name} relé"
    on_turn_on:
      - output.turn_on: led
    on_turn_off:
      - output.turn_off: led

  - platform: restart
    name: "${device_name} restart"

# Status LED for connection
status_led:
  pin:
    number: GPIO2
    inverted: true

# Sensors for Voltage (V), Current (A), Power (W), Daily energy usage (kWh)
sensor:
  - platform: hlw8012
    sel_pin:
      number: GPIO12
      inverted: true
    cf_pin: GPIO5
    cf1_pin: ${cf1_pin}
    current_resistor: ${current_res}
    voltage_divider: ${voltage_div}

    current:
      name: "${device_name} nyers áram"
      id: current_raw
      internal: true
      unit_of_measurement: "A"
      accuracy_decimals: 3
      filters:
        - multiply: ${current_multiply}
      on_value:
        then:
          - component.update: current_calibrated

    voltage:
      name: "${device_name} nyers feszültség"
      id: voltage_raw
      internal: true
      unit_of_measurement: "V"
      accuracy_decimals: 1
      on_value:
        then:
          - component.update: voltage_calibrated

    power:
      name: "${device_name} nyers teljesítmény"
      id: power_raw
      internal: true
      unit_of_measurement: "W"
      accuracy_decimals: 1
      on_value:
        then:
          - component.update: power

    change_mode_every: 4
    update_interval: 10s

  - platform: template
    name: "${device_name} áram"
    id: current_calibrated
    unit_of_measurement: "A"
    accuracy_decimals: 3
    icon: mdi:flash-outline
    update_interval: never
    lambda: |-
      if (isnan(id(current_raw).state)) {
        return NAN;
      }
      return id(current_raw).state * id(current_cal).state;

  - platform: template
    name: "${device_name} feszültség"
    id: voltage_calibrated
    unit_of_measurement: "V"
    accuracy_decimals: 1
    icon: mdi:flash-outline
    update_interval: never
    lambda: |-
      if (isnan(id(voltage_raw).state)) {
        return NAN;
      }
      return id(voltage_raw).state * id(voltage_cal).state;

  - platform: template
    name: "${device_name} teljesítmény"
    id: power
    unit_of_measurement: "W"
    accuracy_decimals: 1
    icon: mdi:flash-outline
    update_interval: never
    lambda: |-
      if (isnan(id(power_raw).state)) {
        return NAN;
      }
      return id(power_raw).state * id(power_cal).state;

  - platform: total_daily_energy
    name: "${device_name} napi fogyasztás"
    power_id: power
    unit_of_measurement: "kWh"
    accuracy_decimals: 5
    filters:
      - multiply: 0.001