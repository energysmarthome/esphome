esphome:
  name: terasz-lampakapcsolo
  friendly_name: terasz_lampakapcsolo

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "in9+KlWiOxOe1T3uV008WYxwymLtM2HipriigfN1rrQ="

ota:
  - platform: esphome
    password: "469b113faca96a6cd02350390b98ff18"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.225
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Terasz-Lampakapcsolo"
    password: "WlU1VbKZg5PY"

captive_portal:
    

web_server:
  port: 80

# Definiáljuk a reléket
switch:

  - platform: restart
    name: "teraszlampakapcsolo Restart"

# Definiáljuk a beépített LED-et, ha van
light:
  - platform: binary
    name: "Beépített LED"
    output: led_output
  - platform: binary
    name: "Terasz lámpa"
    output: led_output2
    id: relay1
  - platform: binary
    name: "Garázs előtti lámpa"
    output: led_output1
    id: relay2

output:
  - platform: gpio
    pin: GPIO13
    id: led_output
  - platform: gpio
    pin: GPIO12
    id: led_output1
  - platform: gpio
    pin: GPIO05
    id: led_output2
# Definiáljuk a gombokat
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Gomb 1"
    on_press:
      - light.toggle: relay2
  - platform: gpio
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: True
    name: "Gomb 2"
    on_press:
      - light.toggle: relay1

