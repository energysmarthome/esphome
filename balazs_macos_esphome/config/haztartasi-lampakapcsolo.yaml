web_server:
  port: 80

# Definiáljuk a reléket
switch:

  - platform: restart
    name: "haztartasilampakapcsolo Restart"


# Definiáljuk a beépített LED-et, ha van
light:
  - platform: binary
    name: "Háztartási Beépített LED"
    output: led_output
  - platform: binary
    name: "Háztartási lámpakapcsoló"
    output: led_output1
    id: relay1
output:
  - platform: gpio
    pin: GPIO13
    inverted: true
    id: led_output
  - platform: gpio
    pin: GPIO12
    inverted: false
    id: led_output1

# Definiáljuk a gombokat
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Háztartási lámpakapcsoló"
    on_press:
      - light.toggle: relay1


