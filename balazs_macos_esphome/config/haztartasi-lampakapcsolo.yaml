  encryption:
    key: "+fu/ZGHdthXBgcePN+qvNG03dDzYkJMrtmowSSyMmhc="

ota:
  - platform: esphome
    password: "32c550c5ffbee6d9b0dd1b41d4f3d829"


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.220
