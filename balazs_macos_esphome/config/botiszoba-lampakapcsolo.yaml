esphome:
  name: botiszoba-lampakapcsolo
  friendly_name: botiszoba_lampakapcsolo

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "TxnM6MYsdgr4pSqB9OuDLEIDSHbNQoEeau6d0hUaPaI="

ota:
  - platform: esphome
    password: "f5a6ff5e42ee73e7ebf7140435929f22"


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.22.223
    gateway: 192.168.22.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Botiszoba-Lampakapcsolo"
    password: "0f4c873EwxHU"

captive_portal:


web_server:
  port: 80

# Definiáljuk a reléket
switch:

  - platform: restart
    name: "botiszobalampakapcsolo Restart"


# Definiáljuk a beépített LED-et, ha van
light:
  - platform: binary
    name: "Boti szoba Beépített LED"
    output: led_output
  - platform: binary
    name: "Boti szoba lámpakapcsoló"
    output: led_output1
    id: relay1

output:
  - platform: gpio
    pin: GPIO13
    inverted: true
    id: led_output
  - platform: gpio
    pin: GPIO12
    inverted: false
    id: led_output1

# Definiáljuk a gombokat
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Boti szoba lámpakapcsoló"
    on_press:
      - light.toggle: relay1