    id: modbus_client

modbus_controller:
  # - id: modbus_client1
  #   modbus_id: modbus_client
  #   address: 1
  #   update_interval: 5s
  - id: modbus_client2
    modbus_id: modbus_client
    address: 2
    update_interval: 5s
  - id: modbus_client3
    modbus_id: modbus_client
    address: 3
    update_interval: 5s

globals:
  - id: kerti_csap_elozo_allapot
    type: bool
    restore_value: no
    initial_value: "false"

  - id: locsolas_mar_aktiv
    type: bool
    restore_value: no
    initial_value: "false"

script:

  - id: locsolas_bekapcsolt

    mode: queued

    then:

      - script.stop: locsolas_kikapcsolt

      - if:

          condition:

            lambda: "return !id(locsolas_mar_aktiv);"

          then:

            - lambda: |-

                id(kerti_csap_elozo_allapot) = id(kerti_csap).state;

                id(locsolas_mar_aktiv) = true;

      - switch.turn_off: kerti_csap

  - id: locsolas_kikapcsolt

    mode: restart

    then:

      - delay: 6s

      - if:

          condition:

            lambda: |-

              return !id(locsolas_kor_1).state &&

                     !id(locsolas_kor_2).state &&

                     !id(locsolas_kor_3).state &&

                     !id(locsolas_kor_4).state &&

                     !id(locsolas_kor_5).state &&

                     !id(locsolas_kor_6).state;

          then:

            - lambda: |-

                id(locsolas_mar_aktiv) = false;

            - if:

                condition:

                  lambda: "return id(kerti_csap_elozo_allapot);"

                then:

                  - switch.turn_on: kerti_csap

                else:

                  - switch.turn_off: kerti_csap

switch:
  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Locsolás kör 5"
    id: locsolas_kor_5
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 0
    bitmask: 1
    on_turn_on:
      - script.execute: locsolas_bekapcsolt
    on_turn_off:
      - script.execute: locsolas_kikapcsolt

  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Locsolás kör 2"
    id: locsolas_kor_2
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 1
    bitmask: 1
    on_turn_on:
      - script.execute: locsolas_bekapcsolt
    on_turn_off:
      - script.execute: locsolas_kikapcsolt

  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Locsolás kör 1"
    id: locsolas_kor_1
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 2
    bitmask: 1
    on_turn_on:
      - script.execute: locsolas_bekapcsolt
    on_turn_off:
      - script.execute: locsolas_kikapcsolt

  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Locsolás kör 3"
    id: locsolas_kor_3
    register_type: coil
    restore_mode: RESTORE_DEFAULT_OFF
    address: 3
    bitmask: 1
    on_turn_on:
      - script.execute: locsolas_bekapcsolt
    on_turn_off:
      - script.execute: locsolas_kikapcsolt

  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Locsolás kör 6"
    id: locsolas_kor_6
    restore_mode: RESTORE_DEFAULT_OFF
    register_type: coil
    address: 4
    bitmask: 1
    on_turn_on:
      - script.execute: locsolas_bekapcsolt
    on_turn_off:
      - script.execute: locsolas_kikapcsolt

  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Locsolás kör 4"
    id: locsolas_kor_4
    restore_mode: RESTORE_DEFAULT_OFF
    register_type: coil
    address: 5
    bitmask: 1
    on_turn_on:
      - script.execute: locsolas_bekapcsolt
    on_turn_off:
      - script.execute: locsolas_kikapcsolt

  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Vízóraakna ivóvíz"
    register_type: coil
    inverted: true
    restore_mode: RESTORE_DEFAULT_ON
    address: 6
    bitmask: 1

  - platform: modbus_controller
    modbus_controller_id: modbus_client3
    name: "Vízóraakna szivattyú"
    restore_mode: RESTORE_DEFAULT_OFF
    register_type: coil
    inverted: true
    address: 7
    bitmask: 1

  - platform: gpio
    name: "Üres relé"
    id: ures_rele
    pin:
      number: GPIO13
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "Kerti csap"
    id: kerti_csap
    pin:
      number: GPIO14
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: restart
    name: "vizoraakna Restart"

